<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Liste</title>

<style>
body{background:#000;color:white;text-align:center;font-family:Arial;}
input{margin:5px;padding:8px;}
.entry{background:#1e1e1e;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<button onclick="history.back()">⬅ Zurück</button>

<h2 id="title"></h2>

<input id="name" placeholder="Name">
<input id="was" placeholder="Was bringst du mit?">
<button onclick="add()">Eintragen</button>

<div id="list"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDezLQGk1wUTUbX9FqLjUa0qzVY0cyHvNc",
  authDomain: "verein-system-f82a6.firebaseapp.com",
  databaseURL: "https://verein-system-f82a6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "verein-system-f82a6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const event = new URLSearchParams(location.search).get("event");
title.innerText = event;

function add(){
  const n = name.value;
  const w = was.value;

  if(!n || !w) return;

  db.ref("test/lists/"+event).push({
    name:n,
    item:w
  });

  name.value="";
  was.value="";
}

db.ref("test/lists/"+event).on("value", snap=>{
  list.innerHTML="";

  snap.forEach(child=>{
    const d = child.val();

    const div = document.createElement("div");
    div.className="entry";
    div.innerText = d.name + " bringt: " + d.item;

    list.appendChild(div);
  });
});
</script>

</body>
</html>
