<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;}

.box{
  background:#1e1e1e;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  max-width:600px;
}

input{
  width:90%;
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.green{background:#00ff99;color:black;}
.red{background:red;color:white;}

.item{
  background:#111;
  margin:10px;
  padding:12px;
  border-radius:12px;
  text-align:left;
}

.warning{color:red;font-weight:bold;}
</style>
</head>

<body>

<h2 id="title"></h2>

<div class="box">

<input id="name" placeholder="Dein Name">
<input id="item" placeholder="Was bringst du mit?">

<input id="maxItem" placeholder="Max Anzahl für diesen Artikel (optional)">

<button class="green" onclick="addItem()">Eintragen</button>

</div>

<div id="list" class="box"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const event = new URLSearchParams(window.location.search).get("event");

document.getElementById("title").innerText = event;

const ADMIN_PW = "12";

let all=[];

// ➕ EINTRAGEN
function addItem(){

  const name = document.getElementById("name").value.trim();
  const item = document.getElementById("item").value.trim();
  const max = document.getElementById("maxItem").value;

  if(!name || !item){
    alert("Bitte ausfüllen");
    return;
  }

  db.ref("test/lists/"+event).once("value", snap=>{

    let count = 0;

    snap.forEach(child=>{
      const d = child.val();
      if(d.item && d.item.toLowerCase() === item.toLowerCase()){
        count++;
      }
    });

    if(max && count >= max){
      alert("Max erreicht!");
      return;
    }

    db.ref("test/lists/"+event).push({
      name,
      item,
      max: max || null
    });

    document.getElementById("item").value="";
  });
}

// 🔥 LADEN
db.ref("test/lists/"+event).on("value", snap=>{
  const list = document.getElementById("list");
  list.innerHTML="";
  all=[];

  snap.forEach(child=>{
    const data = child.val();
    const id = child.key;

    if(!data.item) return;

    all.push({...data,id});
  });

  all.forEach(data=>{

    const count = all.filter(e => 
      e.item.toLowerCase() === data.item.toLowerCase()
    ).length;

    const warn = count>1 
      ? "<span class='warning'>⚠️ mehrfach</span>" 
      : "";

    const div = document.createElement("div");
    div.className="item";

    div.innerHTML = `
      <b>${data.item}</b> ${warn}<br>
      <small>von ${data.name}</small><br><br>
      <button class="red" onclick="removeItem('${data.id}')">Löschen</button>
    `;

    list.appendChild(div);
  });
});

// ❌ LÖSCHEN
function removeItem(id){

  const pw = prompt("Vorstand Passwort:");
  if(pw !== ADMIN_PW){
    alert("Falsch");
    return;
  }

  db.ref("test/lists/"+event+"/"+id).remove();
}
</script>

</body>
</html>
