<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Feedback Liste</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  background:#000;
  color:white;
  font-family:Arial;
  padding:20px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  border-bottom:1px solid #333;
  text-align:left;
}

th {
  background:#111;
}
</style>
</head>

<body>

<h2>📋 Feedback Übersicht</h2>

<table>
  <thead>
    <tr>
      <th>Art</th>
      <th>Text</th>
      <th>Zeit</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

db.ref("feedback").on("value", snap => {

  const data = snap.val() || {};
  const table = document.getElementById("table");
  table.innerHTML = "";

  Object.values(data).reverse().forEach(r => {

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${r.type}</td>
      <td>${r.text}</td>
      <td>${r.time}</td>
    `;

    table.appendChild(row);
  });

});
</script>

</body>
</html>
