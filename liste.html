<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;}
input{padding:10px;margin:5px;border-radius:10px;border:none;}
button{padding:10px;border:none;border-radius:10px;background:#00ff99;}
.item{background:#1e1e1e;margin:10px;padding:10px;border-radius:10px;text-align:left;}
.warning{color:red;}
</style>
</head>

<body>

<h2 id="title"></h2>

<input id="name" placeholder="Dein Name"><br>
<input id="item" placeholder="Was bringst du mit?"><br>

<button onclick="addItem()">Eintragen</button>

<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const event = params.get("event");

document.getElementById("title").innerText = event;

let all=[];

function addItem(){
  const name = document.getElementById("name").value;
  const item = document.getElementById("item").value;

  if(!name || !item) return;

  db.ref("test/lists/"+event).push({name,item});
}

db.ref("test/lists/"+event).on("value", snap=>{
  const list = document.getElementById("list");
  list.innerHTML="";
  all=[];

  snap.forEach(child=>{
    const data = child.val();
    if(!data.item) return;
    all.push(data);
  });

  all.forEach(data=>{
    const count = all.filter(e => 
      e.item.toLowerCase() === data.item.toLowerCase()
    ).length;

    const warn = count>1 ? "<span class='warning'>⚠️ mehrfach</span>" : "";

    const div = document.createElement("div");
    div.className="item";

    div.innerHTML = `
      <b>${data.item}</b> ${warn}<br>
      von ${data.name}
    `;

    list.appendChild(div);
  });
});
</script>

</body>
</html>
