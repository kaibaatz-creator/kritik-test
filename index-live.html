<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Vorstand Live</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial}
.header{text-align:center;padding:15px;border-bottom:1px solid #333}
.logo{height:90px;display:block;margin:0 auto 10px}
.msg{background:#1e1e1e;margin:10px auto;padding:14px;border-radius:14px;max-width:700px}
button{margin:5px;padding:10px;border-radius:10px;border:none}
.delete{background:#ff4444}
.kick{background:red;color:white}
</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<div>👔 Vorstand Live Feedback</div>
</div>

<div style="text-align:center">
<button class="kick" onclick="kickMembers()">Mitglieder kicken</button>
</div>

<div id="chat"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
authDomain:"kritik-system.firebaseapp.com",
databaseURL:"https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"kritik-system"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// LIVE
db.ref("feedback").on("value",snap=>{
const data=snap.val()||{};
const chat=document.getElementById("chat");
chat.innerHTML="";

Object.entries(data).reverse().forEach(([id,r])=>{
const div=document.createElement("div");
div.className="msg";

div.innerHTML=`
<b>${r.type}</b><br>
${r.text}<br>
<small>${r.time}</small><br>
<button class="delete" onclick="del('${id}')">Löschen</button>
`;

chat.appendChild(div);
});
});

// löschen
function del(id){
db.ref("feedback/"+id).remove();
}

// kicken
function kickMembers(){
if(confirm("Alle Mitglieder kicken?")){
db.ref("members").remove();
}
}
</script>

</body>
</html>
