<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vorstand</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial;text-align:center}
.logo{height:140px;margin-top:20px}

/* LOGIN */
#login{margin-top:100px}

input{padding:12px;border-radius:10px;border:none}

/* BUTTONS */
button{padding:12px;border-radius:10px;border:none;margin:5px;font-size:16px}
.kick{background:#0066ff;color:white}
.delete{background:red;color:white}

/* STATS */
#stats{display:flex;justify-content:center;gap:10px;margin:15px;flex-wrap:wrap}
.stat{background:#1e1e1e;padding:8px 12px;border-radius:12px}
.stat.Kritik{color:#ff4444}
.stat.Lob{color:#00ff99}
.stat.Frage{color:#00bfff}
.stat.Vorschlag{color:#ffaa00}

/* FILTER */
#filters{display:flex;gap:10px;padding:10px;flex-wrap:wrap}
#filters button{flex:1;min-width:100px;background:#1e1e1e;color:white}
#filters .active{background:#00ff99;color:black}

/* CHAT */
.msg{
background:#1e1e1e;
margin:12px;
padding:16px;
border-radius:14px;
text-align:left;
font-size:18px;
border-left:4px solid transparent;
}

.msg.Kritik{border-left-color:#ff4444}
.msg.Lob{border-left-color:#00ff99}
.msg.Frage{border-left-color:#00bfff}
.msg.Vorschlag{border-left-color:#ffaa00}

/* BLINK */
@keyframes blink{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}
.new{animation:blink 1s infinite}
</style>
</head>

<body>

<div id="login">
<h2>🔐 Vorstand Login</h2>
<input id="pw" type="password" placeholder="Passwort"><br>
<button onclick="login()">Login</button>
<div id="error"></div>
</div>

<script>
const config={
apiKey:"AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
authDomain:"kritik-system.firebaseapp.com",
databaseURL:"https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"kritik-system"
};

firebase.initializeApp(config);
const db=firebase.database();

let adminId=null;

// LOGIN
function login(){
if(document.getElementById("pw").value!=="1"){
document.getElementById("error").innerText="❌ Falsches Passwort";
return;
}

adminId = localStorage.getItem("adminId") || Date.now().toString();
localStorage.setItem("adminId", adminId);

start();
}

// START
function start(){

db.ref("admins/"+adminId).set(true);
db.ref("admins/"+adminId).onDisconnect().remove();

document.body.innerHTML=`
<img src="logo.png" class="logo">
<h2>📊 Vorstand</h2>

<div>
👥 Mitglieder: <span id="members">0</span><br>
👔 Vorstand: <span id="admins">0</span> / 5
</div>

<button class="kick" onclick="kickMembers()">Mitglieder kicken</button>
<button class="kick" onclick="kickAdmins()">Vorstand kicken</button>

<div id="stats"></div>

<div id="filters">
<button class="active" onclick="setFilter('all',this)">Alle</button>
<button onclick="setFilter('Kritik',this)">Kritik</button>
<button onclick="setFilter('Lob',this)">Lob</button>
<button onclick="setFilter('Frage',this)">Frage</button>
<button onclick="setFilter('Vorschlag',this)">Vorschlag</button>
</div>

<div id="chat"></div>
`;

run();
}

// LOGOUT BEI KICK
function run(){

db.ref("admins").on("value", snap=>{
const data=snap.val()||{};
if(!data[adminId]){
alert("⚠️ Du wurdest gekickt");
localStorage.removeItem("adminId");
location.reload();
}
});

// COUNTS
db.ref("members").on("value",s=>{
document.getElementById("members").innerText=s.numChildren();
});
db.ref("admins").on("value",s=>{
document.getElementById("admins").innerText=s.numChildren();
});

let filter="all";
let cache={};
let seen={};

window.setFilter=(f,el)=>{
filter=f;
document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
};

db.ref("feedback").on("value",snap=>{
cache=snap.val()||{};
render();
});

function render(){
const chat=document.getElementById("chat");
const statsDiv=document.getElementById("stats");

chat.innerHTML="";
statsDiv.innerHTML="";

let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};

Object.entries(cache).reverse().forEach(([id,r])=>{

if(stats[r.type]!=undefined) stats[r.type]++;

if(filter!=="all" && r.type!==filter) return;

const div=document.createElement("div");
div.className="msg "+r.type;

if(!seen[id]){
div.classList.add("new");
setTimeout(()=>div.classList.remove("new"),15000);
seen[id]=true;
}

div.innerHTML=`
<b>${r.type}</b><br>
${r.text}<br>
<small>${r.time}</small><br>
<button class="delete" onclick="del('${id}')">Löschen</button>
`;

chat.appendChild(div);
});

for(let k in stats){
const s=document.createElement("div");
s.className="stat "+k;
s.innerText=k+": "+stats[k];
statsDiv.appendChild(s);
}
}

// DELETE
window.del=(id)=>{
if(prompt("Passwort?")!=="1") return alert("❌ Falsch");
db.ref("feedback/"+id).remove();
};

// KICK
window.kickMembers=()=>{
if(prompt("PW?")!=="2") return alert("❌ Falsch");
db.ref("members").remove();
};

window.kickAdmins=()=>{
if(prompt("PW?")!=="2") return alert("❌ Falsch");
db.ref("admins").remove();
};
}
</script>

</body>
