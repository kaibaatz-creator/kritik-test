<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand Live Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial}

/* LOGIN */
#login{display:flex;height:100vh;justify-content:center;align-items:center;flex-direction:column}
input,button{padding:12px;border-radius:10px;border:none;margin:8px}
button{background:#00ff99;font-weight:bold}

/* HEADER */
.header{text-align:center;padding:15px;border-bottom:1px solid #333}
.logo{height:90px;margin:0 auto 10px;display:block}

/* COUNTS */
#counts{text-align:center;margin:10px}

/* STATS */
#stats{display:flex;justify-content:space-around;padding:10px}
.stat{background:#1e1e1e;padding:6px 10px;border-radius:10px}

/* FILTER */
#filters{display:flex;gap:6px;padding:10px}
#filters button{flex:1;background:#222;color:white}
#filters button.active{background:#00ff99;color:black}

/* CHAT */
#chat{max-width:700px;margin:auto;padding:10px}
.msg{background:#1e1e1e;margin:10px 0;padding:14px;border-radius:14px}
.delete{background:#ff4444;color:white}

/* BLINK */
@keyframes blink{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}
.new{animation:blink 1s infinite}
</style>
</head>

<body>

<div id="login">
<h2>Vorstand Login</h2>
<input id="pw" type="password" placeholder="Passwort">
<button onclick="login()">Login</button>
<div id="error"></div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
authDomain:"kritik-system.firebaseapp.com",
databaseURL:"https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"kritik-system"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// SESSION
const SESSION=30*60*1000;
const loginTime=localStorage.getItem("loginTimeAdmin");

if(loginTime && Date.now()-loginTime<SESSION){
start();
}

function login(){
if(document.getElementById("pw").value==="1"){
localStorage.setItem("loginTimeAdmin",Date.now());
start();
}else{
document.getElementById("error").innerText="❌ Falsch";
}
}

// START
function start(){

const deviceId=localStorage.getItem("deviceId")||Date.now();
localStorage.setItem("deviceId",deviceId);

// ADMIN REGISTER
db.ref("admins/"+deviceId).set(true);
db.ref("admins/"+deviceId).onDisconnect().remove();

document.body.innerHTML=`
<div class="header">
<img src="logo.png" class="logo">
<div>📊 Vorstand Live Feedback</div>
</div>

<div id="counts">
<div id="members">👥 Mitglieder: 0</div>
<div id="admins">👔 Vorstand: 0 / 5</div>
</div>

<div style="text-align:center">
<button onclick="kickAdmins()" style="background:red;color:white">Vorstand kicken</button>
<button onclick="kickMembers()" style="background:blue;color:white">Mitglieder kicken</button>
</div>

<div id="stats">
<div class="stat Kritik">Kritik: 0</div>
<div class="stat Lob">Lob: 0</div>
<div class="stat Frage">Frage: 0</div>
<div class="stat Vorschlag">Vorschlag: 0</div>
</div>

<div id="filters">
<button class="active" onclick="setFilter('all',this)">Alle</button>
<button onclick="setFilter('Frage',this)">Frage</button>
<button onclick="setFilter('Kritik',this)">Kritik</button>
<button onclick="setFilter('Lob',this)">Lob</button>
<button onclick="setFilter('Vorschlag',this)">Vorschlag</button>
</div>

<div id="chat"></div>
`;

// COUNTS
db.ref("members").on("value",snap=>{
db.ref("admins").once("value",a=>{
const admins=a.val()||{};
let count=0;
snap.forEach(c=>{if(!admins[c.key])count++});
document.getElementById("members").innerText="👥 Mitglieder: "+count;
});
});

db.ref("admins").on("value",snap=>{
const d=snap.val();
const c=d?Object.keys(d).length:0;
document.getElementById("admins").innerText="👔 Vorstand: "+c+" / 5";
});

live();
}

// FILTER
let filter="all";
function setFilter(f,el){
filter=f;
document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

// LIVE FEEDBACK
let seen={};

function live(){
db.ref("feedback").on("value",snap=>{
const data=snap.val()||{};
let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};

const chat=document.getElementById("chat");
chat.innerHTML="";

Object.entries(data).reverse().forEach(([id,r])=>{
if(stats[r.type]!=undefined)stats[r.type]++;

if(filter!=="all" && r.type!==filter)return;

const div=document.createElement("div");
div.className="msg";

if(!seen[id]){
div.classList.add("new");
setTimeout(()=>div.classList.remove("new"),15000);
seen[id]=true;
}

div.innerHTML=`
<b>${r.type}</b><br>
${r.text}<br>
<small>${r.time}</small><br>
<button class="delete" onclick="del('${id}')">Löschen</button>
`;

chat.appendChild(div);
});

// stats update
document.querySelector(".stat.Kritik").innerText="Kritik: "+stats.Kritik;
document.querySelector(".stat.Lob").innerText="Lob: "+stats.Lob;
document.querySelector(".stat.Frage").innerText="Frage: "+stats.Frage;
document.querySelector(".stat.Vorschlag").innerText="Vorschlag: "+stats.Vorschlag;

});
}

// DELETE
function del(id){
db.ref("feedback/"+id).remove();
}

// KICK
function kickAdmins(){
if(prompt("PW?")==="2"){
db.ref("admins").remove();
location.reload();
}
}

function kickMembers(){
if(prompt("PW?")==="2"){
db.ref("members").remove();
}
}
</script>

</body>
</html>
