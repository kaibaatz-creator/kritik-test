<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Vorstand Live Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial}

.header{text-align:center;padding:15px;border-bottom:1px solid #333}
.logo{height:90px;margin-bottom:10px}

#counts{text-align:center;margin:10px}

#stats{display:flex;justify-content:center;gap:15px;margin:15px 0}
.stat{background:#1e1e1e;padding:6px 12px;border-radius:10px}
.stat.Kritik{color:#ff4444}
.stat.Lob{color:#00ff99}
.stat.Frage{color:#00bfff}
.stat.Vorschlag{color:#ffaa00}

#filters{display:flex;gap:10px;padding:10px;max-width:700px;margin:auto}
#filters button{flex:1;background:#1e1e1e;color:white;padding:12px;border-radius:12px}
#filters button.active{background:#00ff99;color:black}

.msg{
background:#1e1e1e;
margin:10px auto;
padding:16px;
border-radius:14px;
max-width:700px;
border-left:4px solid transparent;
}
.msg.Kritik{border-left-color:#ff4444}
.msg.Lob{border-left-color:#00ff99}
.msg.Frage{border-left-color:#00bfff}
.msg.Vorschlag{border-left-color:#ffaa00}

.delete{background:#ff4444;color:white;padding:6px 10px;border-radius:8px;border:none;margin-top:5px}

@keyframes blink{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}
.new{animation:blink 1s infinite}
</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<div>📊 Vorstand Live Feedback</div>
</div>

<div id="counts">
<div id="members">👥 Mitglieder: 0</div>
<div id="admins">👔 Vorstand: 0 / 5</div>
</div>

<div style="text-align:center">
<button onclick="kickAdmins()" style="background:#ff4444;color:white">Vorstand kicken</button>
<button onclick="kickMembers()" style="background:#0066ff;color:white">Mitglieder kicken</button>
</div>

<div id="stats">
<div class="stat Kritik">Kritik: 0</div>
<div class="stat Lob">Lob: 0</div>
<div class="stat Frage">Frage: 0</div>
<div class="stat Vorschlag">Vorschlag: 0</div>
</div>

<div id="filters">
<button class="active" onclick="setFilter('all',this)">Alle</button>
<button onclick="setFilter('Kritik',this)">Kritik</button>
<button onclick="setFilter('Lob',this)">Lob</button>
<button onclick="setFilter('Frage',this)">Frage</button>
<button onclick="setFilter('Vorschlag',this)">Vorschlag</button>
</div>

<div id="chat"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
authDomain:"kritik-system.firebaseapp.com",
databaseURL:"https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"kritik-system"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let filter="all";
let seen={};

function setFilter(f,el){
filter=f;
document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render(lastData);
}

let lastData={};

db.ref("feedback").on("value",snap=>{
lastData=snap.val()||{};
render(lastData);
});

function render(data){

let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};
const chat=document.getElementById("chat");
chat.innerHTML="";

Object.entries(data).reverse().forEach(([id,r])=>{

if(stats[r.type]!=undefined)stats[r.type]++;

if(filter!=="all" && r.type!==filter)return;

const div=document.createElement("div");
div.className="msg "+r.type;

if(!seen[id]){
div.classList.add("new");
setTimeout(()=>div.classList.remove("new"),15000);
seen[id]=true;
}

div.innerHTML=`
<b>${r.type}</b><br>
${r.text}<br>
<small>${r.time}</small><br>
<button class="delete" onclick="del('${id}')">Löschen</button>
`;

chat.appendChild(div);
});

// stats
document.querySelector(".stat.Kritik").innerText="Kritik: "+stats.Kritik;
document.querySelector(".stat.Lob").innerText="Lob: "+stats.Lob;
document.querySelector(".stat.Frage").innerText="Frage: "+stats.Frage;
document.querySelector(".stat.Vorschlag").innerText="Vorschlag: "+stats.Vorschlag;
}

// DELETE MIT PASSWORT
function del(id){
if(prompt("Passwort?")!=="1") return alert("❌ Falsch");
db.ref("feedback/"+id).remove();
}

// KICK
function kickAdmins(){
if(prompt("PW?")!=="2") return;
db.ref("admins").remove();
}

function kickMembers(){
if(prompt("PW?")!=="2") return;
db.ref("members").remove();
}

// COUNTS
db.ref("members").on("value",snap=>{
db.ref("admins").once("value",a=>{
const admins=a.val()||{};
let count=0;
snap.forEach(c=>{if(!admins[c.key])count++});
document.getElementById("members").innerText="👥 Mitglieder: "+count;
});
});

db.ref("admins").on("value",snap=>{
const d=snap.val();
const c=d?Object.keys(d).length:0;
document.getElementById("admins").innerText="👔 Vorstand: "+c+" / 5";
});
</script>

</body>
</html>
