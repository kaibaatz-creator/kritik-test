<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitglieder Feedback (Live)</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial;
  color: white;
}

/* LOGO */
.logo {
  height: 90px;
  display: block;
  margin: 20px auto 10px;
}

/* HEADER */
.header {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
}

/* COUNTS */
#counts {
  text-align: center;
  margin: 10px;
}

/* STATS */
#stats {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 10px;
  margin: 15px;
}

.stat {
  background: #222;
  padding: 8px 12px;
  border-radius: 10px;
}

/* FORM */
.form {
  text-align: center;
  margin: 20px;
}

textarea {
  width: 90%;
  max-width: 400px;
  height: 100px;
  border-radius: 10px;
  padding: 10px;
  border: none;
}

/* BUTTONS */
.buttons {
  margin-top: 10px;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  background: #00ff99;
  font-weight: bold;
  cursor: pointer;
}

/* FILTER */
#filters {
  text-align: center;
  margin: 15px;
}

.filter {
  margin: 5px;
  padding: 10px 15px;
  background: #222;
  border-radius: 10px;
  display: inline-block;
  cursor: pointer;
}

.active {
  background: #00ff99;
  color: black;
}

/* CHAT */
.msg {
  background: #1e1e1e;
  margin: 10px auto;
  padding: 15px;
  border-radius: 12px;
  max-width: 600px;
  border-left: 4px solid #00ff99;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">

<div class="header">👥 Mitglieder Feedback</div>

<div id="counts">
  👥 Mitglieder: <span id="membersCount">0</span><br>
  👔 Vorstand: <span id="adminCount">0</span>
</div>

<div id="stats">
  <div class="stat" id="kritik">Kritik: 0</div>
  <div class="stat" id="lob">Lob: 0</div>
  <div class="stat" id="frage">Frage: 0</div>
  <div class="stat" id="vorschlag">Vorschlag: 0</div>
</div>

<div class="form">
  <textarea id="text" placeholder="Dein Feedback"></textarea>

  <div class="buttons">
    <button onclick="send('Lob')">Lob</button>
    <button onclick="send('Frage')">Frage</button>
    <button onclick="send('Kritik')">Kritik</button>
    <button onclick="send('Vorschlag')">Vorschlag</button>
  </div>
</div>

<div id="filters">
  <span class="filter active" onclick="setFilter('all', this)">Alle</span>
  <span class="filter" onclick="setFilter('Frage', this)">Frage</span>
  <span class="filter" onclick="setFilter('Lob', this)">Lob</span>
  <span class="filter" onclick="setFilter('Vorschlag', this)">Vorschlag</span>
</div>

<div id="chat"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentFilter = "all";

// SENDEN
function send(type){
  const text = document.getElementById("text").value;

  if(!text){
    alert("Text fehlt");
    return;
  }

  db.ref("feedback").push({
    type: type,
    text: text,
    time: new Date().toLocaleString()
  });

  document.getElementById("text").value="";
}

// FILTER
function setFilter(f, el){
  currentFilter = f;

  document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
}

// LIVE DATA
db.ref("feedback").on("value", snap => {

  const data = snap.val() || {};
  const list = Object.values(data);

  let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};

  let display = list.map(r=>{
    if(stats[r.type] !== undefined) stats[r.type]++;
    return r;
  });

  if(currentFilter !== "all"){
    display = display.filter(r=>r.type === currentFilter);
  }

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  display.reverse().forEach(r=>{
    const div = document.createElement("div");
    div.className="msg";

    div.innerHTML = `
      <b>${r.type}</b><br>
      ${r.text}<br>
      <small>${r.time}</small>
    `;

    chat.appendChild(div);
  });

  document.getElementById("kritik").innerText="Kritik: "+stats.Kritik;
  document.getElementById("lob").innerText="Lob: "+stats.Lob;
  document.getElementById("frage").innerText="Frage: "+stats.Frage;
  document.getElementById("vorschlag").innerText="Vorschlag: "+stats.Vorschlag;

});

// MEMBERS COUNT
const deviceId = localStorage.getItem("deviceId") || Date.now().toString();
localStorage.setItem("deviceId", deviceId);

const ref = db.ref("members/" + deviceId);
ref.set(true);
ref.onDisconnect().remove();

db.ref("members").on("value", snap => {
  document.getElementById("membersCount").innerText = snap.numChildren();
});

// ADMINS
db.ref("admins").on("value", snap => {
  document.getElementById("adminCount").innerText = snap.numChildren();
});
</script>

</body>
</html>
