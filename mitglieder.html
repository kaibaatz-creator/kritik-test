<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Übersicht</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial;
  color: white;
}

#login {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

input, button {
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin: 10px;
  width: 80%;
  max-width: 300px;
  font-size: 16px;
}

button {
  background: #00ff99;
  font-weight: bold;
}

#error {
  color: red;
}

/* HEADER */
#stats, #avg {
  max-width: 700px;
  margin: auto;
  padding: 12px;
  display: flex;
  justify-content: space-around;
  border-bottom: 1px solid #333;
}

.stat { font-weight: bold; }
.stat.Kritik { color: #ff4444; }
.stat.Lob { color: #00ff99; }
.stat.Frage { color: #00bfff; }
.stat.Vorschlag { color: #ffaa00; }

#filters {
  max-width: 700px;
  margin: auto;
  padding: 10px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

#filters button.active {
  background: #00ff99;
  color: black;
}

#chat {
  max-width: 700px;
  margin: auto;
  padding: 10px;
}

.msg {
  background: #1e1e1e;
  margin: 10px 0;
  padding: 14px;
  border-radius: 14px;
}

.type { font-weight: bold; margin-bottom: 6px; }
.type.Frage { color: #00bfff; }
.type.Lob { color: #00ff99; }
.type.Vorschlag { color: #ffaa00; }

.text { font-size: 16px; }
.time { font-size: 12px; color: #00ff99; text-align: right; }
</style>

</head>

<body>

<div id="login">
  <h2>Mitglieder Login</h2>
  <input type="password" id="pw" placeholder="Passwort">
  <button onclick="checkLogin()">Login</button>
  <div id="error"></div>
</div>

<script>
const password = "tesT333";
const SESSION_TIME = 15 * 60 * 1000;

const loginTime = localStorage.getItem("loginTime");

if (loginTime && (Date.now() - loginTime < SESSION_TIME)) {
  startApp();
}

function checkLogin() {
  const input = document.getElementById("pw").value;

  if (input === password) {
    localStorage.setItem("loginTime", Date.now());
    startApp();
  } else {
    document.getElementById("error").innerText = "Falsches Passwort";
  }
}

function startApp() {

document.body.innerHTML = `
<div id="stats">
  <div class="stat Kritik">Kritik: 0</div>
  <div class="stat Lob">Lob: 0</div>
  <div class="stat Frage">Frage: 0</div>
  <div class="stat Vorschlag">Vorschlag: 0</div>
</div>

<div id="avg">Ø Bewertung: -</div>

<div id="filters">
  <button onclick="setFilter('all', this)" class="active">Alle</button>
  <button onclick="setFilter('Frage', this)">Frage</button>
  <button onclick="setFilter('Lob', this)">Lob</button>
  <button onclick="setFilter('Vorschlag', this)">Vorschlag</button>
</div>

<div id="chat"></div>
`;

let currentFilter = "all";

const url = "https://opensheet.elk.sh/1d2Xf-u1DOMsqlXmwMi05VDD9O6sR4OsmBnQnVqjqGzg/Sheet1";

window.setFilter = function(filter, el) {
  currentFilter = filter;
  document.querySelectorAll("#filters button").forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");
  load();
}

async function load() {
  const res = await fetch(url);
  const data = await res.json();

  let stats = { Kritik:0, Lob:0, Frage:0, Vorschlag:0 };

  let processed = data
    .filter(row => row["Dein Feedback"])
    .map(row => {
      let type="", rating="", timeValue="";
      for (let key in row) {
        if (key.toLowerCase().includes("art")) type = row[key];
        if (key.toLowerCase().includes("zeit")) timeValue = row[key];
      }
      if (stats[type] !== undefined) stats[type]++;
      return { ...row, type, timeValue };
    });

  // 👉 Kritik NICHT anzeigen
  let filtered = processed.filter(r => r.type !== "Kritik");

  if (currentFilter !== "all") {
    filtered = filtered.filter(r => r.type === currentFilter);
  }

  document.querySelector(".stat.Kritik").innerText = "Kritik: " + stats.Kritik;
  document.querySelector(".stat.Lob").innerText = "Lob: " + stats.Lob;
  document.querySelector(".stat.Frage").innerText = "Frage: " + stats.Frage;
  document.querySelector(".stat.Vorschlag").innerText = "Vorschlag: " + stats.Vorschlag;

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  filtered.slice(-30).reverse().forEach(row => {
    const div = document.createElement("div");
    div.className = "msg";

    const type = document.createElement("div");
    type.className = "type " + row.type;
    type.innerText = "● " + row.type;

    const text = document.createElement("div");
    text.className = "text";
    text.innerText = row["Dein Feedback"];

    const time = document.createElement("div");
    time.className = "time";
    time.innerText = row.timeValue || "-";

    div.appendChild(type);
    div.appendChild(text);
    div.appendChild(time);
    chat.appendChild(div);
  });
}

setInterval(load, 3000);
load();

}
</script>

</body>
</html>
