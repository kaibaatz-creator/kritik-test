<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitglieder Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div id="login">
  <input id="pw" type="password" placeholder="Code">
  <button onclick="login()">Login</button>
  <div id="error"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentPassword="";

db.ref("settings/memberPassword").on("value", snap=>{
  currentPassword = snap.val()||"";
});

function login(){
  const pw=document.getElementById("pw").value;

  if(pw===currentPassword){
    localStorage.setItem("loginTimeMembers", Date.now());
    start();
  } else {
    document.getElementById("error").innerText="❌ Falsch";
  }
}

function start(){

  db.ref("settings/forceLogoutMembers").on("value", snap=>{
    const t=snap.val();
    if(t && t>localStorage.getItem("loginTimeMembers")){
      localStorage.removeItem("loginTimeMembers");
      location.reload();
    }
  });

  document.body.innerHTML="<h2>👥 Eingeloggt</h2>";
}
</script>

</body>
</html>
