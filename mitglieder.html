<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Übersicht</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial;
  color: white;
}

/* LOGIN */
#login {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

input {
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin: 10px;
  width: 80%;
  max-width: 300px;
  font-size: 16px;
}

button {
  background: #00ff99;
  border: none;
  padding: 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  width: 80%;
  max-width: 300px;
  font-size: 16px;
}

#error {
  color: red;
  margin-top: 10px;
}

/* HEADER */
#stats, #avg {
  max-width: 700px;
  margin: auto;
  padding: 12px;
  display: flex;
  justify-content: space-around;
  border-bottom: 1px solid #333;
  font-size: 14px;
}

.stat { font-weight: bold; }
.stat.Lob { color: #00ff99; }
.stat.Frage { color: #00bfff; }
.stat.Vorschlag { color: #ffaa00; }

/* FILTER */
#filters {
  max-width: 700px;
  margin: auto;
  padding: 10px;
  display: flex;
  gap: 8px;
  overflow-x: auto;
}

#filters button {
  background: #222;
  color: white;
  flex: 1;
}

#filters button.active {
  background: #00ff99;
  color: black;
}

/* CHAT */
#chat {
  max-width: 700px;
  margin: auto;
  padding: 10px;
}

.msg {
  background: #1e1e1e;
  margin: 10px 0;
  padding: 14px;
  border-radius: 14px;
}

.type { font-weight: bold; margin-bottom: 6px; font-size: 14px; }
.dot { margin-right: 6px; }

.type.Frage { color: #00bfff; }
.type.Lob { color: #00ff99; }
.type.Vorschlag { color: #ffaa00; }

.stars {
  color: gold;
  margin-left: 8px;
}

.text { font-size: 16px; margin-top: 5px; }

.time {
  font-size: 12px;
  color: #00ff99;
  text-align: right;
  margin-top: 8px;
}
</style>

</head>

<body>

<div id="login">
  <h2>Mitglieder Login</h2>
  <input type="password" id="pw" placeholder="Passwort eingeben">
  <button onclick="checkLogin()">Login</button>
  <div id="error"></div>
</div>

<script>
const password = "tesT333";
const SESSION_TIME = 15 * 60 * 1000; // 15 Minuten

/* 🔥 SESSION CHECK */
const loginTime = localStorage.getItem("loginTime");

if (loginTime && (Date.now() - loginTime < SESSION_TIME)) {
  startApp();
}

function checkLogin() {
  const input = document.getElementById("pw").value;

  if (input === password) {
    localStorage.setItem("loginTime", Date.now());
    startApp();
  } else {
    document.getElementById("error").innerText = "Falsches Passwort";
  }
}

function startApp() {

document.body.innerHTML = `
<div id="stats">
  <div class="stat Lob">Lob: 0</div>
  <div class="stat Frage">Frage: 0</div>
  <div class="stat Vorschlag">Vorschlag: 0</div>
</div>

<div id="avg">Ø Bewertung: -</div>

<div id="filters">
  <button onclick="setFilter('all', this)" class="active">Alle</button>
  <button onclick="setFilter('Frage', this)">Frage</button>
  <button onclick="setFilter('Lob', this)">Lob</button>
  <button onclick="setFilter('Vorschlag', this)">Vorschlag</button>
</div>

<div id="chat"></div>
`;

let currentFilter = "all";

const url = "https://opensheet.elk.sh/1d2Xf-u1DOMsqlXmwMi05VDD9O6sR4OsmBnQnVqjqGzg/Sheet1";

function getStars(num) {
  let stars = "";
  num = parseInt(num);
  for (let i = 1; i <= 5; i++) {
    stars += i <= num ? "★" : "☆";
  }
  return stars;
}

window.setFilter = function(filter, el) {
  currentFilter = filter;
  document.querySelectorAll("#filters button").forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");
  load();
}

async function load() {
  const res = await fetch(url);
  const data = await res.json();

  let stats = { Lob:0, Frage:0, Vorschlag:0 };

  let filtered = data
    .filter(row => row["Dein Feedback"])
    .map(row => {
      let type="", rating="", timeValue="";
      for (let key in row) {
        if (key.toLowerCase().includes("art")) type = row[key];
        if (key.toLowerCase().includes("wie")) rating = parseInt(row[key]);
        if (key.toLowerCase().includes("zeit")) timeValue = row[key];
      }
      return { ...row, type, rating, timeValue };
    })
    .filter(row => row.type !== "Kritik");

  filtered.forEach(r => {
    if (stats[r.type] !== undefined) stats[r.type]++;
  });

  document.querySelector(".stat.Lob").innerText = "Lob: " + stats.Lob;
  document.querySelector(".stat.Frage").innerText = "Frage: " + stats.Frage;
  document.querySelector(".stat.Vorschlag").innerText = "Vorschlag: " + stats.Vorschlag;

  if (currentFilter !== "all") {
    filtered = filtered.filter(r => r.type === currentFilter);
  }

  const ratings = filtered.map(r => r.rating).filter(r => !isNaN(r));
  let avg = "-";
  if (ratings.length > 0) {
    const sum = ratings.reduce((a,b)=>a+b,0);
    avg = getStars(Math.round(sum / ratings.length));
  }

  document.getElementById("avg").innerText = "Ø Bewertung: " + avg;

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  filtered.slice(-30).reverse().forEach(row => {
    const div = document.createElement("div");
    div.className = "msg";

    const type = document.createElement("div");
    type.className = "type " + row.type;

    const dot = document.createElement("span");
    dot.className = "dot";
    dot.innerText = "●";

    type.appendChild(dot);
    type.appendChild(document.createTextNode(row.type || "Unbekannt"));

    if (row.rating) {
      const stars = document.createElement("span");
      stars.className = "stars";
      stars.innerText = getStars(row.rating);
      type.appendChild(stars);
    }

    const text = document.createElement("div");
    text.className = "text";
    text.innerText = row["Dein Feedback"];

    const time = document.createElement("div");
    time.className = "time";
    time.innerText = row.timeValue || "-";

    div.appendChild(type);
    div.appendChild(text);
    div.appendChild(time);
    chat.appendChild(div);
  });
}

setInterval(load, 3000);
load();

}
</script>

</body>
</html>
