<script>
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// USER START
function start(){

  const deviceId = localStorage.getItem("deviceId") || Date.now().toString();
  localStorage.setItem("deviceId", deviceId);

  const memberRef = db.ref("members/" + deviceId);
  memberRef.set(true);
  memberRef.onDisconnect().remove();

  document.body.innerHTML = `
    <h2>Mitglied aktiv</h2>
  `;

  // 🔥 FORCE LOGOUT FÜR MITGLIEDER
  db.ref("settings/forceLogoutMembers").on("value", snap => {
    if (snap.exists()) {
      alert("Du wurdest ausgeloggt!");
      localStorage.clear();
      location.reload();
    }
  });
}

start();
</script>
