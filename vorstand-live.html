<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { background:#000; color:white; font-family:Arial; text-align:center; margin:0; }

.logo { height:90px; margin:20px auto; display:block; }

button {
  margin:5px; padding:10px 15px;
  border:none; border-radius:10px;
  font-weight:bold; cursor:pointer;
}

.kick { background:red; color:white; }
.delete { background:#ff4444; }

.msg {
  background:#1e1e1e; margin:10px auto;
  padding:15px; border-radius:12px;
  max-width:600px; text-align:left;
}
</style>
</head>

<body>

<img src="logo.png" class="logo">
<h2>👔 Vorstand Live Feedback</h2>

<button class="kick" onclick="kickMembers()">Mitglieder kicken</button>

<h3>Feed</h3>
<div id="chat"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 Mitglieder kicken
function kickMembers(){
  if(confirm("Alle Mitglieder kicken?")){
    db.ref("members").remove();
  }
}

// 🔥 Live Feed
db.ref("feedback").on("value", snap => {

  const data = snap.val()||{};
  const chat = document.getElementById("chat");
  chat.innerHTML="";

  Object.entries(data).reverse().forEach(([id, r])=>{

    const div=document.createElement("div");
    div.className="msg";

    div.innerHTML=`
      <b>${r.type}</b><br>
      ${r.text}<br>
      <small>${r.time}</small><br>
      <button class="delete" onclick="del('${id}')">Löschen</button>
    `;

    chat.appendChild(div);
  });

});

// 🔥 Feedback löschen
function del(id){
  db.ref("feedback/"+id).remove();
}
</script>

</body>
</html>
