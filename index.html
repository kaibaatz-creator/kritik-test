<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand</title>

<!-- 🔥 Firebase zuerst -->

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { margin:0; background:#0f0f0f; color:white; font-family:Arial;}

#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input,button{
  padding:12px;
  border-radius:8px;
  border:none;
  margin:8px;
}

button{background:#00ff99;}

#error{
  color:red;
  margin-top:5px;
  font-size:14px;
}

#counts{text-align:center;margin:10px;}
#stats{display:flex;justify-content:space-around;padding:10px;}

.stat.Kritik{color:#ff4444;}
.stat.Lob{color:#00ff99;}
.stat.Frage{color:#00bfff;}
.stat.Vorschlag{color:#ffaa00;}

#chat{max-width:700px;margin:auto;padding:10px;}
.msg{background:#1e1e1e;margin:10px 0;padding:12px;border-radius:12px;}

#status{
  font-weight:bold;
  margin-top:5px;
}
</style>

</head>

<body>

<div id="login">
  <h2>Vorstand Login</h2>
  <input id="pw" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
  <div id="error"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ⏱️ SESSION
const SESSION_TIME = 60 * 60 * 1000;
const loginTime = localStorage.getItem("loginTimeAdmin");

if (loginTime && (Date.now() - loginTime < SESSION_TIME)) {
  start();
}

function login(){
  const pw = document.getElementById("pw").value;

  if(pw === "1"){
    localStorage.setItem("loginTimeAdmin", Date.now());
    start();
  } else {
    document.getElementById("error").innerText = "❌ Falsches Passwort";
  }
}

function start(){

document.body.innerHTML = `
<div id="counts">
  <div id="members">👥 Mitglieder: 0</div>
  <div id="admins">👔 Vorstand: 0</div>
  <div id="status">⏳ wird geprüft...</div>
</div>

<div id="stats">
  <div class="stat Kritik">Kritik: 0</div>
  <div class="stat Lob">Lob: 0</div>
  <div class="stat Frage">Frage: 0</div>
  <div class="stat Vorschlag">Vorschlag: 0</div>
</div>

<div id="chat"></div>
`;

const url="https://opensheet.elk.sh/1d2Xf-u1DOMsqlXmwMi05VDD9O6sR4OsmBnQnVqjqGzg/Sheet1";

// 👔 Vorstand zählen
const ref = db.ref("admins").push();
ref.set(true);
ref.onDisconnect().remove();

// 👥 Mitglieder anzeigen
db.ref("members").on("value", snap=>{
  document.getElementById("members").innerText =
    "👥 Mitglieder: " + snap.numChildren();
});

// 👔 Vorstand + Status
const MAX_ADMINS = 5;

db.ref("admins").on("value", snap=>{
  let count = snap.numChildren();

  document.getElementById("admins").innerText =
    "👔 Vorstand: " + count;

  if(count >= MAX_ADMINS){
    document.getElementById("status").innerText =
      "✅ Vorstand vollständig";
  } else {
    document.getElementById("status").innerText =
      "❌ Vorstand fehlt (" + count + "/" + MAX_ADMINS + ")";
  }
});

// 📊 Feedback laden
async function load(){
  const res = await fetch(url);
  const data = await res.json();

  let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};

  const chat=document.getElementById("chat");
  chat.innerHTML="";

  data.filter(r=>r["Dein Feedback"]).slice(-20).reverse().forEach(r=>{
    let type="";
    for(let k in r){
      if(k.toLowerCase().includes("art")) type=r[k];
    }

    if(stats[type]!=undefined) stats[type]++;

    const div=document.createElement("div");
    div.className="msg";
    div.innerHTML="<b>"+type+"</b><br>"+r["Dein Feedback"];
    chat.appendChild(div);
  });

  document.querySelector(".stat.Kritik").innerText="Kritik: "+stats.Kritik;
  document.querySelector(".stat.Lob").innerText="Lob: "+stats.Lob;
  document.querySelector(".stat.Frage").innerText="Frage: "+stats.Frage;
  document.querySelector(".stat.Vorschlag").innerText="Vorschlag: "+stats.Vorschlag;
}

setInterval(load,3000);
load();

}
</script>

</body>
</html>
