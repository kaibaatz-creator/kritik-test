<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand Live Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
  font-family: Arial;
  color: white;
}

#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input,button{
  padding:12px;
  border-radius:10px;
  border:none;
  margin:8px;
}

button{
  background:#00ff99;
  font-weight:bold;
}

#error{color:red;}

.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  border-bottom:1px solid #333;
}

#counts{
  text-align:center;
  margin:10px;
}

#stats{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.stat{
  background:#1e1e1e;
  padding:6px 10px;
  border-radius:10px;
}

#filters{
  display:flex;
  gap:6px;
  padding:10px;
}

#filters button{
  flex:1;
  background:#222;
  color:white;
}

#filters button.active{
  background:#00ff99;
  color:black;
}

#chat{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.msg{
  background:#1e1e1e;
  margin:10px 0;
  padding:14px;
  border-radius:14px;
}

.msg.Frage{border-left:4px solid #00bfff;}
.msg.Kritik{border-left:4px solid #ff4444;}
.msg.Lob{border-left:4px solid #00ff99;}
.msg.Vorschlag{border-left:4px solid #ffaa00;}
</style>
</head>

<body>

<div id="login">
  <h2>Vorstand Login</h2>
  <input id="pw" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
  <div id="error"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔐 Session
const SESSION_TIME = 10 * 60 * 1000;
const loginTime = localStorage.getItem("loginTimeAdmin") || 0;

if (loginTime && (Date.now() - loginTime < SESSION_TIME)) {
  start();
} else {
  localStorage.removeItem("loginTimeAdmin");
}

// 🔥 Logout Fix (Vorstand)
let firstLoad = true;

db.ref("settings/forceLogout").on("value", snap => {
  if(firstLoad){
    firstLoad = false;
    return;
  }

  const logoutTime = snap.val() || 0;
  const loginTime = localStorage.getItem("loginTimeAdmin") || 0;

  if(loginTime < logoutTime){
    localStorage.removeItem("loginTimeAdmin");
    location.reload();
  }
});

// 🔥 Logout Fix (Mitglieder)
let firstLoadMembers = true;

db.ref("settings/forceLogoutMembers").on("value", snap => {
  if(firstLoadMembers){
    firstLoadMembers = false;
    return;
  }

  const logoutTime = snap.val() || 0;
  const loginTime = localStorage.getItem("loginTimeAdmin") || 0;

  if(loginTime < logoutTime){
    location.reload();
  }
});

// Login
function login(){
  if(document.getElementById("pw").value==="1"){
    localStorage.setItem("loginTimeAdmin", Date.now());
    start();
  } else {
    document.getElementById("error").innerText="❌ Falsches Passwort";
  }
}

// START
function start(){

  const deviceId = localStorage.getItem("deviceId") || Date.now().toString();
  localStorage.setItem("deviceId", deviceId);

  // Vorstand
// Vorstand
const adminRef = db.ref("admins/" + deviceId);
adminRef.set(true);
adminRef.onDisconnect().remove();

// ❌ Admin darf KEIN Mitglied sein
db.ref("members/" + deviceId).remove();

  // Mitglieder
  const memberRef = db.ref("members/" + deviceId);
  memberRef.set(true);
  memberRef.onDisconnect().remove();

  document.body.innerHTML = `
  <div class="header">📊 Vorstand Live Feedback</div>

  <div id="counts">
    <div id="members">👥 Mitglieder: 0</div>
    <div id="admins">👔 Vorstand: 0</div>
  </div>

  <div style="text-align:center;">
    <button onclick="kickAdmins()" style="background:red;color:white;margin:5px;">
      Vorstand kicken
    </button>

    <button onclick="kickMembers()" style="background:blue;color:white;margin:5px;">
      Mitglieder kicken
    </button>
  </div>

  <div id="stats">
    <div class="stat Kritik">Kritik: 0</div>
    <div class="stat Lob">Lob: 0</div>
    <div class="stat Frage">Frage: 0</div>
    <div class="stat Vorschlag">Vorschlag: 0</div>
  </div>

  <div id="filters">
    <button class="active" onclick="setFilter('all', this)">Alle</button>
    <button onclick="setFilter('Frage', this)">Frage</button>
    <button onclick="setFilter('Kritik', this)">Kritik</button>
    <button onclick="setFilter('Lob', this)">Lob</button>
    <button onclick="setFilter('Vorschlag', this)">Vorschlag</button>
  </div>

  <div id="chat"></div>
  `;

  // Mitglieder zählen
  db.ref("members").on("value",snap=>{
    document.getElementById("members").innerText="👥 Mitglieder: "+snap.numChildren();
  });

  // Vorstand zählen
const MAX_ADMINS = 5;

db.ref("admins").on("value",snap=>{
  const count = snap.numChildren();
  document.getElementById("admins").innerText =
    "👔 Vorstand: " + count + " / " + MAX_ADMINS;
});

  load();
  setInterval(load,3000);
}

// 🔴 Vorstand kicken
function kickAdmins(){
  const pw = prompt("Admin Passwort eingeben:");

  if(pw === "2"){
    db.ref("admins").remove();
    db.ref("settings/forceLogout").set(Date.now());
    location.reload();
  } else {
    alert("Falsches Passwort!");
  }
}

// 🔵 Mitglieder kicken
function kickMembers(){
  const pw = prompt("Admin Passwort eingeben:");

  if(pw === "2"){
    db.ref("members").remove();
    db.ref("settings/forceLogoutMembers").set(Date.now());
    location.reload();
  } else {
    alert("Falsches Passwort!");
  }
}

// Filter
let currentFilter="all";

function setFilter(filter,el){
  currentFilter=filter;
  document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  load();
}

// Feedback laden
const url="https://opensheet.elk.sh/1d2Xf-u1DOMsqlXmwMi05VDD9O6sR4OsmBnQnVqjqGzg/Sheet1";

async function load(){
  const res=await fetch(url);
  const data=await res.json();

  let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};

  let all=data.map(r=>{
    let type="",time="";
    for(let k in r){
      if(k.toLowerCase().includes("art")) type=r[k];
      if(k.toLowerCase().includes("zeit")) time=r[k];
    }
    if(stats[type]!=undefined) stats[type]++;
    return {...r,type,time};
  });

  let display = all;
  if(currentFilter!=="all"){
    display = all.filter(r=>r.type===currentFilter);
  }

  document.querySelector(".stat.Kritik").innerText="Kritik: "+stats.Kritik;
  document.querySelector(".stat.Lob").innerText="Lob: "+stats.Lob;
  document.querySelector(".stat.Frage").innerText="Frage: "+stats.Frage;
  document.querySelector(".stat.Vorschlag").innerText="Vorschlag: "+stats.Vorschlag;

  const chat=document.getElementById("chat");
  chat.innerHTML="";

  display.slice(-30).reverse().forEach(r=>{
    const div=document.createElement("div");
    div.className="msg "+r.type;

    div.innerHTML=`
      <b>${r.type}</b><br>
      ${r["Dein Feedback"]}<br>
      <span style="font-size:12px;color:#888">${r.time||"-"}</span>
    `;

    chat.appendChild(div);
  });
}
</script>

</body>
</html>
