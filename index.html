<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand Live Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { margin:0; background:#000; font-family:Arial; color:white; }
.header { text-align:center; padding:15px; border-bottom:1px solid #333; }
.logo { height:100px; display:block; margin:0 auto 10px; }

#login { display:flex; height:100vh; justify-content:center; align-items:center; flex-direction:column; }

input,button{ padding:12px; border-radius:10px; border:none; margin:8px; }
button{ background:#00ff99; font-weight:bold; cursor:pointer; }

.stat{ background:#1e1e1e; padding:6px 10px; border-radius:10px; }
.msg{ background:#1e1e1e; margin:10px 0; padding:14px; border-radius:14px; }

.msg.Frage{border-left:4px solid #00bfff;}
.msg.Kritik{border-left:4px solid #ff4444;}
.msg.Lob{border-left:4px solid #00ff99;}
.msg.Vorschlag{border-left:4px solid #ffaa00;}
</style>
</head>

<body>

<div id="login">
  <h2>Vorstand Login</h2>
  <input id="pw" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const SESSION_TIME = 30*60*1000;
const loginTime = localStorage.getItem("loginTimeAdmin");

if(loginTime && Date.now()-loginTime<SESSION_TIME) start();

function login(){
  if(document.getElementById("pw").value==="1"){
    localStorage.setItem("loginTimeAdmin", Date.now());
    start();
  }
}

function start(){

  db.ref("settings/forceLogout").on("value", snap=>{
    const t=snap.val();
    if(t && t>localStorage.getItem("loginTimeAdmin")){
      localStorage.removeItem("loginTimeAdmin");
      location.reload();
    }
  });

  document.body.innerHTML=`
  <div class="header">
    <img src="logo.png" class="logo">
    <div>📊 Vorstand Live Feedback</div>
  </div>

  <div style="text-align:center;">
    <button onclick="generatePassword()" style="background:orange;color:black;">
      Neues Mitglieder Passwort
    </button>
    <div id="currentPw"></div>
  </div>

  <div id="stats" style="display:flex;justify-content:space-around;">
    <div class="stat Kritik">Kritik: 0</div>
    <div class="stat Lob">Lob: 0</div>
    <div class="stat Frage">Frage: 0</div>
    <div class="stat Vorschlag">Vorschlag: 0</div>
  </div>

  <div style="display:flex;justify-content:center;gap:15px;margin:10px;">
    <div style="color:#ff4444;">■ Kritik</div>
    <div style="color:#00ff99;">■ Lob</div>
    <div style="color:#00bfff;">■ Frage</div>
    <div style="color:#ffaa00;">■ Vorschlag</div>
  </div>

  <div id="chat"></div>
  `;

  db.ref("settings/memberPassword").on("value", snap=>{
    document.getElementById("currentPw").innerText =
      "🔑 Code: "+(snap.val()||"-");
  });

  load();
  setInterval(load,3000);
}

function generatePassword(){
  const newPw = Math.floor(1000 + Math.random()*9000).toString();
  db.ref("settings/memberPassword").set(newPw);
  db.ref("settings/forceLogoutMembers").set(Date.now());
  alert("Neues Passwort: "+newPw);
}

const url="https://opensheet.elk.sh/1d2Xf-u1DOMsqlXmwMi05VDD9O6sR4OsmBnQnVqjqGzg/Sheet1";

async function load(){
  const res=await fetch(url);
  const data=await res.json();

  const chat=document.getElementById("chat");
  chat.innerHTML="";

  data.slice(-30).reverse().forEach(r=>{
    const div=document.createElement("div");
    div.className="msg "+r.Art;
    div.innerHTML=`<b>${r.Art}</b><br>${r["Dein Feedback"]}`;
    chat.appendChild(div);
  });
}
</script>
</body>
</html>
