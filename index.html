<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand Live Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
  font-family: Arial;
  color: white;
}

.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  border-bottom:1px solid #333;
}

#counts{
  text-align:center;
  margin:10px;
}

#stats{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.stat{
  background:#1e1e1e;
  padding:6px 10px;
  border-radius:10px;
}

#filters{
  display:flex;
  gap:6px;
  padding:10px;
}

#filters button{
  flex:1;
  background:#222;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
}

#filters button.active{
  background:#00ff99;
  color:black;
}

#chat{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.msg{
  background:#1e1e1e;
  margin:10px 0;
  padding:14px;
  border-radius:14px;
}

.msg.Frage{border-left:4px solid #00bfff;}
.msg.Kritik{border-left:4px solid #ff4444;}
.msg.Lob{border-left:4px solid #00ff99;}
.msg.Vorschlag{border-left:4px solid #ffaa00;}
</style>
</head>

<body>
function start(){
document.body.innerHTML = `
<div class="header">📊 Vorstand Live Feedback</div>

<div id="counts">
  <div id="members">👥 Mitglieder: 0</div>
  <div id="admins">👔 Vorstand: 0</div>
  <div id="status"></div>
</div>

<div id="stats">
  <div class="stat Kritik">Kritik: 0</div>
  <div class="stat Lob">Lob: 0</div>
  <div class="stat Frage">Frage: 0</div>
  <div class="stat Vorschlag">Vorschlag: 0</div>
</div>

<div id="filters">
  <button class="active" onclick="setFilter('all', this)">Alle</button>
  <button onclick="setFilter('Frage', this)">Frage</button>
  <button onclick="setFilter('Kritik', this)">Kritik</button>
  <button onclick="setFilter('Lob', this)">Lob</button>
  <button onclick="setFilter('Vorschlag', this)">Vorschlag</button>
</div>

<div id="chat"></div>
`;

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👔 Vorstand registrieren
const adminRef = db.ref("admins").push();

adminRef.set(true)
.then(() => console.log("✅ Admin gesetzt"))
.catch(err => console.error("❌ Fehler:", err));

adminRef.onDisconnect().remove();

// 👥 Mitglieder zählen
db.ref("members").on("value",snap=>{
  document.getElementById("members").innerText="👥 Mitglieder: "+snap.numChildren();
});

// 👔 Vorstand zählen + Status
const MAX_ADMINS = 5;

db.ref("admins").on("value",snap=>{
  let count=snap.numChildren();
  document.getElementById("admins").innerText="👔 Vorstand: "+count;

  if(count>=MAX_ADMINS){
    document.getElementById("status").innerText="✅ Vorstand vollständig";
  }else{
    document.getElementById("status").innerText="❌ Vorstand fehlt ("+count+"/"+MAX_ADMINS+")";
  }
});

// Filter
let currentFilter="all";

function setFilter(filter,el){
  currentFilter=filter;
  document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  load();
}

// 📡 Feedback laden
const url="https://opensheet.elk.sh/1d2Xf-u1DOMsqlXmwMi05VDD9O6sR4OsmBnQnVqjqGzg/Sheet1";

async function load(){
  const res=await fetch(url);
  const data=await res.json();

  let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};

  let all=data.map(r=>{
    let type="",time="";
    for(let k in r){
      if(k.toLowerCase().includes("art")) type=r[k];
      if(k.toLowerCase().includes("zeit")) time=r[k];
    }
    if(stats[type]!=undefined) stats[type]++;
    return {...r,type,time};
  });

  let display = all;
  if(currentFilter!=="all"){
    display = all.filter(r=>r.type===currentFilter);
  }

  document.querySelector(".stat.Kritik").innerText="Kritik: "+stats.Kritik;
  document.querySelector(".stat.Lob").innerText="Lob: "+stats.Lob;
  document.querySelector(".stat.Frage").innerText="Frage: "+stats.Frage;
  document.querySelector(".stat.Vorschlag").innerText="Vorschlag: "+stats.Vorschlag;

  const chat=document.getElementById("chat");
  chat.innerHTML="";

  display.slice(-30).reverse().forEach(r=>{
    const div=document.createElement("div");
    div.className="msg "+r.type;

    div.innerHTML=`
      <b>${r.type}</b><br>
      ${r["Dein Feedback"]}<br>
      <span style="font-size:12px;color:#888">${r.time||"-"}</span>
    `;

    chat.appendChild(div);
  });
}

setInterval(load,3000);
load();
</script>

</body>
</html>
