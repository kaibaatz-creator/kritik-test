<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand Live Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { margin:0; background:#000; font-family:Arial; color:white; }

.header { text-align:center; padding:15px; border-bottom:1px solid #333; }
.logo { height:100px; display:block; margin:auto; }

.stat{ background:#1e1e1e; padding:6px 10px; border-radius:10px; }

.msg{
  background:#1e1e1e;
  margin:10px 0;
  padding:14px;
  border-radius:14px;
}

.msg.Frage{border-left:4px solid #00bfff;}
.msg.Kritik{border-left:4px solid #ff4444;}
.msg.Lob{border-left:4px solid #00ff99;}
.msg.Vorschlag{border-left:4px solid #ffaa00;}
</style>
</head>

<body>

<div id="login">
  <input id="pw" type="password" placeholder="Admin Passwort">
  <button onclick="login()">Login</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function login(){
  if(document.getElementById("pw").value==="1"){
    start();
  }
}

function start(){

  document.body.innerHTML=`
  <div class="header">
    <img src="logo.png" class="logo">
    <div>📊 Vorstand Live Feedback</div>
  </div>

  <div style="text-align:center;">
    <button onclick="kickAdmins()" style="background:red;color:white;">Vorstand kicken</button>
    <button onclick="kickMembers()" style="background:blue;color:white;">Mitglieder kicken</button>
    <button onclick="generatePassword()" style="background:orange;">Neues Mitglieder Passwort</button>
    <div id="currentPw"></div>
  </div>

  <div style="display:flex;justify-content:space-around;">
    <div class="stat Kritik">Kritik: 0</div>
    <div class="stat Lob">Lob: 0</div>
    <div class="stat Frage">Frage: 0</div>
    <div class="stat Vorschlag">Vorschlag: 0</div>
  </div>

  <div style="display:flex;justify-content:center;gap:15px;margin:10px;">
    <div style="color:#ff4444;">■ Kritik</div>
    <div style="color:#00ff99;">■ Lob</div>
    <div style="color:#00bfff;">■ Frage</div>
    <div style="color:#ffaa00;">■ Vorschlag</div>
  </div>

  <div id="chat"></div>
  `;

  db.ref("settings/memberPassword").on("value", snap=>{
    document.getElementById("currentPw").innerText =
      "🔑 Code: " + (snap.val()||"-");
  });

  load();
  setInterval(load,3000);
}

function generatePassword(){
  const newPw = Math.floor(1000 + Math.random()*9000).toString();
  db.ref("settings/memberPassword").set(newPw);
  db.ref("settings/forceLogoutMembers").set(Date.now());
  alert("Neues Passwort: "+newPw);
}

function kickAdmins(){
  if(prompt("PW?")==="2"){
    db.ref("admins").remove();
    db.ref("settings/forceLogout").set(Date.now());
    location.reload();
  }
}

function kickMembers(){
  if(prompt("PW?")==="2"){
    db.ref("members").remove();
    db.ref("settings/forceLogoutMembers").set(Date.now());
    location.reload();
  }
}

const url="https://opensheet.elk.sh/1d2Xf-u1DOMsqlXmwMi05VDD9O6sR4OsmBnQnVqjqGzg/Sheet1";

async function load(){
  const res=await fetch(url);
  const data=await res.json();

  const chat=document.getElementById("chat");
  chat.innerHTML="";

  data.slice(-30).reverse().forEach(r=>{
    let type="";
    for(let k in r){
      if(k.toLowerCase().includes("art")) type=r[k];
    }

    const div=document.createElement("div");
    div.className="msg "+type;

    div.innerHTML=`
      <b>${type}</b><br>
      ${r["Dein Feedback"]}
    `;

    chat.appendChild(div);
  });
}
</script>

</body>
</html>
