<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Vorstand</title>

<!-- =========================
     🎨 STYLE EINBINDEN
========================= -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">
  <h1>Vorstand</h1>

  <!-- =========================
       📊 HIER KOMMEN FEEDBACKS REIN
  ========================= -->
  <div id="feedbackList"></div>
</div>

<script>

/* =====================================================
   🔐 LOGIN SYSTEM (Vorstand = 1 Stunde gültig)
===================================================== */
const loginTime = localStorage.getItem("adminLogin");

if (!loginTime || Date.now() - loginTime > 3600000) {
  const pw = prompt("Passwort Vorstand?");
  
  if (pw !== "admin") {
    document.body.innerHTML = "Kein Zugriff";
    throw new Error("STOP SCRIPT");
  }

  localStorage.setItem("adminLogin", Date.now());
}


/* =====================================================
   📡 DATEN LADEN (HIER SPÄTER OPENSHEET EINBAUEN)
===================================================== */
const data = [
  {text:"Das ist Kritik", kategorie:"Kritik"},
  {text:"Super gemacht!", kategorie:"Lob"},
  {text:"Wie funktioniert das?", kategorie:"Frage"},
  {text:"Idee für Event", kategorie:"Vorschlag"}
];


/* =====================================================
   🧩 FEEDBACK ELEMENT ERSTELLEN
   → erzeugt eine Box pro Eintrag
===================================================== */
function createFeedback(item) {

  const div = document.createElement("div");

  /* Kategorie in CSS-Format umwandeln */
  const cat = item.kategorie.toLowerCase();

  /* Klassen setzen (wichtig für Farben + Blinken) */
  div.classList.add("feedback", cat);

  /* Inhalt */
  div.innerHTML = `
    <strong>${item.kategorie}</strong><br>
    ${item.text}
  `;

  /* Neues Feedback = Blinken starten */
  addBlink(div);

  return div;
}


/* =====================================================
   ✨ BLINK FUNKTION (läuft 20 Sekunden)
   → nur Rahmen blinkt, nicht Text
===================================================== */
function addBlink(element) {

  element.classList.add("blink");

  setTimeout(() => {
    element.classList.remove("blink");
  }, 20000);

}


/* =====================================================
   🔄 RENDERN DER FEEDBACKS
   → alle Daten in die Seite einfügen
===================================================== */
const list = document.getElementById("feedbackList");

data.forEach(item => {

  const el = createFeedback(item);

  list.appendChild(el);

});

</script>

</body>
</html>
