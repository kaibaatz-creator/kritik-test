<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veranstaltungen</title>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;}
.card{background:#1e1e1e;margin:10px;padding:15px;border-radius:12px;cursor:pointer;}
</style>
</head>

<body>

<h1>🎉 Veranstaltungen</h1>
<button onclick="createEvent()">➕ Neue Veranstaltung</button>

<h2>📄 Infos</h2>
<div id="infoList"></div>

<h2>🧺 Listen</h2>
<div id="listList"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDezLQGk1wUTUbX9FqLjUa0qzVY0cyHvNc",
  authDomain: "verein-system-f82a6.firebaseapp.com",
  databaseURL: "https://verein-system-f82a6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "verein-system-f82a6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function createEvent(){
  const name = prompt("Name:");
  if(!name) return;

  const type = prompt("1 = Liste | 2 = Info");

  const key = name.toLowerCase().replace(/\s+/g,"_");

  db.ref("test/events/"+key).set({
    name,
    type
  });
}

function loadEvents(){
  db.ref("test/events").on("value", snap=>{
    infoList.innerHTML="";
    listList.innerHTML="";

    snap.forEach(child=>{
      const d = child.val();
      const key = child.key;

      const div = document.createElement("div");
      div.className="card";
      div.innerHTML = "<b>"+d.name+"</b>";

      div.onclick = ()=>{
        if(d.type=="1"){
          location.href="liste.html?event="+key;
        }else{
          location.href="info.html?event="+key;
        }
      };

      if(d.type=="2"){
        infoList.appendChild(div);
      }else{
        listList.appendChild(div);
      }
    });
  });
}

loadEvents();
</script>

</body>
</html>
