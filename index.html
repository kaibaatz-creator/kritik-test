<script>
const password = "vorstand";
const SESSION_TIME = 60 * 60 * 1000; // 1 Stunde

window.addEventListener("load", () => {
  const loginTime = localStorage.getItem("loginTimeVorstand");

  // 🔥 Nur prüfen beim echten Seitenstart
  if (loginTime && (Date.now() - loginTime < SESSION_TIME)) {
    startApp();
  }
});

// Login Button
function checkLogin() {
  const input = document.getElementById("pw").value;

  if (input === password) {
    localStorage.setItem("loginTimeVorstand", Date.now());
    startApp();
  } else {
    document.getElementById("error").innerText = "Falsches Passwort";
  }
}
</script>
