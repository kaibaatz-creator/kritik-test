<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand Live Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
  font-family: Arial;
  color: white;
}

#login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input,button{
  padding:12px;
  border-radius:10px;
  border:none;
  margin:8px;
}

button{
  background:#00ff99;
  font-weight:bold;
}

#error{ color:red; }

.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
  border-bottom:1px solid #333;
}

#counts{
  text-align:center;
  margin:10px;
}

#status{
  margin-top:5px;
  font-weight:bold;
}

#stats{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.stat{
  background:#1e1e1e;
  padding:6px 10px;
  border-radius:10px;
}

.stat.Kritik{color:#ff4444;}
.stat.Lob{color:#00ff99;}
.stat.Frage{color:#00bfff;}
.stat.Vorschlag{color:#ffaa00;}

#filters{
  display:flex;
  gap:6px;
  padding:10px;
}

#filters button{
  flex:1;
  background:#222;
  color:white;
}

#filters button.active{
  background:#00ff99;
  color:black;
}

#chat{
  max-width:700px;
  margin:auto;
  padding:10px;
}

.msg{
  background:#1e1e1e;
  margin:10px 0;
  padding:14px;
  border-radius:14px;
  border-left:4px solid transparent;
}

.msg.Frage{border-left-color:#00bfff;}
.msg.Kritik{border-left-color:#ff4444;}
.msg.Lob{border-left-color:#00ff99;}
.msg.Vorschlag{border-left-color:#ffaa00;}

.type{font-weight:bold;margin-bottom:6px;}
.time{font-size:12px;color:#888;text-align:right;margin-top:8px;}

/* 🔵 Frage */
@keyframes blinkBlue {
  0% { border-color: #00bfff; }
  50% { border-color: transparent; }
  100% { border-color: #00bfff; }
}
.msg.new.Frage {
  border: 2px solid #00bfff;
  animation: blinkBlue 1s infinite;
}

/* 🔴 Kritik */
@keyframes blinkRed {
  0% { border-color: #ff4444; }
  50% { border-color: transparent; }
  100% { border-color: #ff4444; }
}
.msg.new.Kritik {
  border: 4px solid #ff4444;
  box-shadow: 0 0 12px #ff4444;
  animation: blinkRed 1s infinite;
}

/* 🟢 Lob */
@keyframes blinkGreen {
  0% { border-color: #00ff99; }
  50% { border-color: transparent; }
  100% { border-color: #00ff99; }
}
.msg.new.Lob {
  border: 2px solid #00ff99;
  animation: blinkGreen 1s infinite;
}

/* 🟠 Vorschlag */
@keyframes blinkOrange {
  0% { border-color: #ffaa00; }
  50% { border-color: transparent; }
  100% { border-color: #ffaa00; }
}
.msg.new.Vorschlag {
  border: 2px solid #ffaa00;
  animation: blinkOrange 1s infinite;
}
</style>

</head>

<body>

<div id="login">
  <h2>Vorstand Login</h2>
  <input id="pw" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
  <div id="error"></div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const SESSION_TIME = 60 * 60 * 1000;
const loginTime = localStorage.getItem("loginTimeAdmin");

if (loginTime && (Date.now() - loginTime < SESSION_TIME)) {
  start();
}

function login(){
  if(document.getElementById("pw").value==="1"){
    localStorage.setItem("loginTimeAdmin", Date.now());
    start();
  } else {
    document.getElementById("error").innerText="❌ Falsches Passwort";
  }
}

function start(){

document.body.innerHTML = `
<div class="header">📊 Vorstand Live Feedback</div>

<div id="counts">
  <div id="members">👥 Mitglieder: 0</div>
  <div id="admins">👔 Vorstand: 0</div>
  <div id="status">⏳ wird geprüft...</div>
</div>

<div id="stats">
  <div class="stat Kritik">Kritik: 0</div>
  <div class="stat Lob">Lob: 0</div>
  <div class="stat Frage">Frage: 0</div>
  <div class="stat Vorschlag">Vorschlag: 0</div>
</div>

<div id="filters">
  <button class="active" onclick="setFilter('all', this)">Alle</button>
  <button onclick="setFilter('Frage', this)">Frage</button>
  <button onclick="setFilter('Kritik', this)">Kritik</button>
  <button onclick="setFilter('Lob', this)">Lob</button>
  <button onclick="setFilter('Vorschlag', this)">Vorschlag</button>
</div>

<div id="chat"></div>
`;

let currentFilter="all";
let blinkMap = {};
let lastCount = null; // 🔥 FIX

window.setFilter=function(filter,el){
  currentFilter=filter;
  document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  load();
}

const adminRef=db.ref("admins").push();
adminRef.set(true);
adminRef.onDisconnect().remove();

db.ref("members").on("value",snap=>{
  document.getElementById("members").innerText="👥 Mitglieder: "+snap.numChildren();
});

const MAX_ADMINS=5;

db.ref("admins").on("value",snap=>{
  let count=snap.numChildren();
  document.getElementById("admins").innerText="👔 Vorstand: "+count;

  if(count>=MAX_ADMINS){
    document.getElementById("status").innerText="✅ Vorstand vollständig";
  }else{
    document.getElementById("status").innerText="❌ Vorstand fehlt ("+count+"/"+MAX_ADMINS+")";
  }
});

const url="https://opensheet.elk.sh/1d2Xf-u1DOMsqlXmwMi05VDD9O6sR4OsmBnQnVqjqGzg/Sheet1";

async function load(){
  const res=await fetch(url);
  const data=await res.json();

  let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};

  let filtered=data.filter(r=>r["Dein Feedback"]).map(r=>{
    let type="",time="";
    for(let k in r){
      if(k.toLowerCase().includes("art")) type=r[k];
      if(k.toLowerCase().includes("zeit")) time=r[k];
    }
    if(stats[type]!=undefined) stats[type]++;
    return {...r,type,time};
  });

  if(currentFilter!=="all"){
    filtered=filtered.filter(r=>r.type===currentFilter);
  }

  const now = Date.now();

  // 🔥 verhindert Blinken beim ersten Laden
  if (lastCount === null) {
    lastCount = filtered.length;
  }

  const newMessages = filtered.length - lastCount;

  if (newMessages > 0) {
    filtered.slice(-newMessages).forEach(r => {
      const key = r.time + r["Dein Feedback"];
      blinkMap[key] = now;
    });
  }

  document.querySelector(".stat.Kritik").innerText="Kritik: "+stats.Kritik;
  document.querySelector(".stat.Lob").innerText="Lob: "+stats.Lob;
  document.querySelector(".stat.Frage").innerText="Frage: "+stats.Frage;
  document.querySelector(".stat.Vorschlag").innerText="Vorschlag: "+stats.Vorschlag;

  const chat=document.getElementById("chat");
  chat.innerHTML="";

  filtered.slice(-30).reverse().forEach(r=>{
    const div=document.createElement("div");
    div.className="msg "+r.type;

    const key = r.time + r["Dein Feedback"];
    if (blinkMap[key] && (now - blinkMap[key] < 20000)) {
      div.classList.add("new");
    }

    div.innerHTML=`
      <div class="type">● ${r.type}</div>
      <div>${r["Dein Feedback"]}</div>
      <div class="time">${r.time || "-"}</div>
    `;

    chat.appendChild(div);
  });

  lastCount = filtered.length;
}

setInterval(load,3000);
load();

}
</script>

</body>
</html>
