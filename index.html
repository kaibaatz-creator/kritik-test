<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorstand Live Chat</title>

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
  font-family: Arial;
  color: white;
}

/* LOGIN */
#login {
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

input, button {
  padding: 14px;
  border-radius: 10px;
  border: none;
  margin: 10px;
  width: 80%;
  max-width: 300px;
}

button {
  background: #00ff99;
  font-weight: bold;
}

#error { color: red; }

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid #333;
}

/* COUNTS */
#counts {
  text-align: center;
  margin: 10px;
  font-size: 16px;
}

#adminStatus {
  margin-top: 5px;
  font-weight: bold;
}

/* STATS */
#stats {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.stat {
  padding: 6px 10px;
  border-radius: 8px;
  background: #1e1e1e;
}

.stat.Kritik { color: #ff4444; }
.stat.Lob { color: #00ff99; }
.stat.Frage { color: #00bfff; }
.stat.Vorschlag { color: #ffaa00; }

/* FILTER */
#filters {
  display: flex;
  gap: 6px;
  padding: 10px;
}

#filters button {
  flex: 1;
  background: #222;
  color: white;
}

#filters button.active {
  background: #00ff99;
  color: black;
}

/* CHAT */
#chat {
  padding: 10px;
  max-width: 700px;
  margin: auto;
}

.msg {
  background: #1e1e1e;
  margin: 10px 0;
  padding: 14px;
  border-radius: 14px;
  border-left: 4px solid transparent;
}

.msg.Frage { border-left-color: #00bfff; }
.msg.Kritik { border-left-color: #ff4444; }
.msg.Lob { border-left-color: #00ff99; }
.msg.Vorschlag { border-left-color: #ffaa00; }

.type { font-weight: bold; margin-bottom: 6px; }
.text { font-size: 16px; }

.time {
  font-size: 12px;
  color: #888;
  text-align: right;
  margin-top: 8px;
}
</style>

</head>

<body>

<div id="login">
  <h2>Vorstand Login</h2>
  <input type="password" id="pw" placeholder="Passwort">
  <button onclick="checkLogin()">Login</button>
  <div id="error"></div>
</div>

<script>
const password = "1";
const SESSION_TIME = 60 * 60 * 1000;

const loginTime = localStorage.getItem("loginTimeVorstand");

if (loginTime && (Date.now() - loginTime < SESSION_TIME)) {
  startApp();
}

function checkLogin() {
  const input = document.getElementById("pw").value;

  if (input === password) {
    localStorage.setItem("loginTimeVorstand", Date.now());
    startApp();
  } else {
    document.getElementById("error").innerText = "Falsches Passwort";
  }
}

function startApp() {

document.body.innerHTML = `
<div class="header">📊 Vorstand Live Feedback</div>

<div id="counts">
  <div id="membersCount">👥 Mitglieder: 0</div>
  <div id="adminCount">👔 Vorstand: 0</div>
  <div id="adminStatus">⏳ wird geprüft...</div>
</div>

<div id="stats">
  <div class="stat Kritik">Kritik: 0</div>
  <div class="stat Lob">Lob: 0</div>
  <div class="stat Frage">Frage: 0</div>
  <div class="stat Vorschlag">Vorschlag: 0</div>
</div>

<div id="filters">
  <button onclick="setFilter('all', this)" class="active">Alle</button>
  <button onclick="setFilter('Frage', this)">Frage</button>
  <button onclick="setFilter('Kritik', this)">Kritik</button>
  <button onclick="setFilter('Lob', this)">Lob</button>
  <button onclick="setFilter('Vorschlag', this)">Vorschlag</button>
</div>

<div id="chat"></div>
`;

let currentFilter = "all";

const url = "https://opensheet.elk.sh/1d2Xf-u1DOMsqlXmwMi05VDD9O6sR4OsmBnQnVqjqGzg/Sheet1";

window.setFilter = function(filter, el) {
  currentFilter = filter;
  document.querySelectorAll("#filters button").forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");
  load();
}

async function load() {
  const res = await fetch(url);
  const data = await res.json();

  let stats = { Kritik:0, Lob:0, Frage:0, Vorschlag:0 };

  let filtered = data
    .filter(row => row["Dein Feedback"])
    .map(row => {
      let type="", timeValue="";
      for (let key in row) {
        if (key.toLowerCase().includes("art")) type = row[key];
        if (key.toLowerCase().includes("zeit")) timeValue = row[key];
      }
      if (stats[type] !== undefined) stats[type]++;
      return { ...row, type, timeValue };
    });

  document.querySelector(".stat.Kritik").innerText = "Kritik: " + stats.Kritik;
  document.querySelector(".stat.Lob").innerText = "Lob: " + stats.Lob;
  document.querySelector(".stat.Frage").innerText = "Frage: " + stats.Frage;
  document.querySelector(".stat.Vorschlag").innerText = "Vorschlag: " + stats.Vorschlag;

  if (currentFilter !== "all") {
    filtered = filtered.filter(r => r.type === currentFilter);
  }

  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  filtered.slice(-30).reverse().forEach(row => {
    const div = document.createElement("div");
    div.className = "msg " + row.type;

    const type = document.createElement("div");
    type.className = "type";
    type.innerText = "● " + (row.type || "Unbekannt");

    const text = document.createElement("div");
    text.className = "text";
    text.innerText = row["Dein Feedback"];

    const time = document.createElement("div");
    time.className = "time";
    time.innerText = row.timeValue || "-";

    div.appendChild(type);
    div.appendChild(text);
    div.appendChild(time);
    chat.appendChild(div);
  });
}

setInterval(load, 3000);
load();

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system",
  storageBucket: "kritik-system.firebasestorage.app",
  messagingSenderId: "515871128284",
  appId: "1:515871128284:web:2db651b4dc5a876a1c9219"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👔 Vorstand zählt sich
const adminRef = db.ref("admins").push();
adminRef.set(true);
adminRef.onDisconnect().remove();

// 👥 Mitglieder zählen
db.ref("members").on("value", snap => {
  document.getElementById("membersCount").innerText =
    "👥 Mitglieder: " + snap.numChildren();
});

// 👔 Vorstand zählen + Status
const MAX_ADMINS = 5;

db.ref("admins").on("value", snap => {
  const count = snap.numChildren();

  document.getElementById("adminCount").innerText =
    "👔 Vorstand: " + count;

  if (count >= MAX_ADMINS) {
    document.getElementById("adminStatus").innerText =
      "✅ Vorstand vollständig";
  } else {
    document.getElementById("adminStatus").innerText =
      "❌ Vorstand fehlt (" + count + "/" + MAX_ADMINS + ")";
  }
});

}
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</body>
</html>
