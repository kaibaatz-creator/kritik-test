<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veranstaltungen</title>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

h2{
  margin-top:20px;
}

.card{
  background:#1e1e1e;
  margin:15px auto;
  padding:20px;
  border-radius:15px;
  cursor:pointer;
  max-width:400px;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🎉 Veranstaltungen</h2>

<div id="events"></div>

<br>

<button onclick="createEvent()">➕ Neue Veranstaltung</button>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔥 EVENT ERSTELLEN
function createEvent(){

  const pw = prompt("Passwort:");
  if(pw !== "12"){
    alert("Falsches Passwort");
    return;
  }

  const name = prompt("Name der Veranstaltung:");
  if(!name) return;

  const key = name.toLowerCase().replace(/\s+/g,"_");

  const type = prompt("1 = Liste\n2 = Info");

  if(type !== "1" && type !== "2"){
    alert("Abbruch");
    return;
  }

  db.ref("test/events/"+key).set({
    name: name,
    type: type
  });

  alert("Event erstellt!");
}

// 🔥 EVENTS LADEN
function loadEvents(){
  const container = document.getElementById("events");

  db.ref("test/events").on("value", snap=>{
    container.innerHTML="";

    snap.forEach(child=>{
      const data = child.val();
      const key = child.key;

      const div = document.createElement("div");
      div.className="card";

      const typeText = data.type === "1" ? "📝 Liste" : "📄 Info";

      div.innerHTML = `
        <b>${data.name}</b><br>
        <small>${typeText}</small>
      `;

      div.onclick = function(){
        if(data.type === "1"){
          window.location.href = "liste.html?event=" + key;
        }else{
          window.location.href = "info.html?event=" + key;
        }
      };

      container.appendChild(div);
    });
  });
}

// Start
loadEvents();
</script>

</body>
</html>
