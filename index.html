<script>
const firebaseConfig = {
  apiKey: "DEIN_KEY",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const SESSION_TIME = 30 * 60 * 1000;
const loginTime = localStorage.getItem("loginTimeAdmin");

// Auto Login
if (loginTime && (Date.now() - loginTime < SESSION_TIME)) {
  start();
}

// Login
function login(){
  if(document.getElementById("pw").value==="1"){
    localStorage.setItem("loginTimeAdmin", Date.now());
    start();
  } else {
    document.getElementById("error").innerText="❌ Falsches Passwort";
  }
}

// START
function start(){

  const deviceId = localStorage.getItem("deviceId") || Date.now().toString();
  localStorage.setItem("deviceId", deviceId);

  const adminRef = db.ref("admins/" + deviceId);
  adminRef.set(true);
  adminRef.onDisconnect().remove();

  document.body.innerHTML = `
    <h2>Admin aktiv</h2>
    <button onclick="kickAdmins()">Admins kicken</button>
    <button onclick="kickMembers()">Mitglieder kicken</button>
  `;

  // 🔥 FORCE LOGOUT LISTENER
  db.ref("settings/forceLogout").on("value", snap => {
    if (snap.exists()) {
      alert("Du wurdest ausgeloggt!");
      localStorage.removeItem("loginTimeAdmin");
      location.reload();
    }
  });
}

// KICK ADMIN
function kickAdmins(){
  const pw = prompt("Admin Passwort:");
  if(pw === "2"){
    db.ref("admins").remove();
    db.ref("settings/forceLogout").set(Date.now());
  }
}

// KICK MEMBERS
function kickMembers(){
  const pw = prompt("Admin Passwort:");
  if(pw === "2"){
    db.ref("members").remove();
    db.ref("settings/forceLogoutMembers").set(Date.now());
  }
}
</script>
