<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mitglieder Feedback</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial;text-align:center}

.logo{height:80px;margin-top:20px}

textarea{
width:90%;
height:120px;
border-radius:12px;
padding:10px;
font-size:18px;
}

button{
padding:12px;
border-radius:10px;
border:none;
margin:5px;
background:#00ff99;
font-size:16px;
}

/* FILTER */
#filters{display:flex;gap:10px;padding:10px;flex-wrap:wrap}
#filters button{flex:1;min-width:100px;background:#1e1e1e;color:white}
#filters .active{background:#00ff99;color:black}

/* CHAT */
.msg{
background:#1e1e1e;
margin:12px;
padding:16px;
border-radius:14px;
text-align:left;
font-size:18px;
border-left:4px solid transparent;
}

.msg.Kritik{border-left-color:#ff4444}
.msg.Lob{border-left-color:#00ff99}
.msg.Frage{border-left-color:#00bfff}
.msg.Vorschlag{border-left-color:#ffaa00}
</style>
</head>

<body>

<img src="logo.png" class="logo">
<h2>👥 Mitglieder Feedback</h2>

<textarea id="text" placeholder="Dein Feedback"></textarea><br>

<button onclick="send('Kritik')">Kritik</button>
<button onclick="send('Lob')">Lob</button>
<button onclick="send('Frage')">Frage</button>
<button onclick="send('Vorschlag')">Vorschlag</button>

<div id="filters">
<button class="active" onclick="setFilter('all',this)">Alle</button>
<button onclick="setFilter('Kritik',this)">Kritik</button>
<button onclick="setFilter('Lob',this)">Lob</button>
<button onclick="setFilter('Frage',this)">Frage</button>
<button onclick="setFilter('Vorschlag',this)">Vorschlag</button>
</div>

<div id="chat"></div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
authDomain:"kritik-system.firebaseapp.com",
databaseURL:"https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// 🔥 MEMBER REGISTRIEREN
const memberId = localStorage.getItem("memberId") || Date.now().toString();
localStorage.setItem("memberId", memberId);
db.ref("members/"+memberId).set(true);
db.ref("members/"+memberId).onDisconnect().remove();

let filter="all";
let lastData={};

function setFilter(f,el){
filter=f;
document.querySelectorAll("#filters button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
}

function send(type){
const text=document.getElementById("text").value;
if(!text)return;

db.ref("feedback").push({
type,text,time:new Date().toLocaleTimeString()
});

document.getElementById("text").value="";
}

db.ref("feedback").on("value",snap=>{
lastData=snap.val()||{};
render();
});

function render(){
const chat=document.getElementById("chat");
chat.innerHTML="";

Object.values(lastData).reverse().forEach(r=>{
if(filter!=="all" && r.type!==filter) return;

const div=document.createElement("div");
div.className="msg "+r.type;

div.innerHTML=`
<b>${r.type}</b><br>
${r.text}<br>
<small>${r.time}</small>
`;

chat.appendChild(div);
});
}
</script>

</body>
</html>
