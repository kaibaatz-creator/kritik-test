<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mitglieder</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{margin:0;background:#000;color:white;font-family:Arial;text-align:center}
.logo{height:140px;margin-top:20px}

/* LOGIN */
#login{margin-top:100px}
input{padding:12px;border-radius:10px;border:none}

/* INPUT */
textarea{
width:90%;
height:120px;
border-radius:12px;
padding:10px;
font-size:18px;
}

button{
padding:12px;
border-radius:10px;
border:none;
margin:5px;
background:#00ff99;
font-size:16px;
}

/* STATS */
#stats{display:flex;justify-content:center;gap:10px;margin:15px;flex-wrap:wrap}
.stat{background:#1e1e1e;padding:8px 12px;border-radius:12px}
.stat.Kritik{color:#ff4444}
.stat.Lob{color:#00ff99}
.stat.Frage{color:#00bfff}
.stat.Vorschlag{color:#ffaa00}

/* CHAT */
.msg{
background:#1e1e1e;
margin:12px;
padding:16px;
border-radius:14px;
text-align:left;
font-size:18px;
border-left:4px solid transparent;
}

.msg.Kritik{border-left-color:#ff4444}
.msg.Lob{border-left-color:#00ff99}
.msg.Frage{border-left-color:#00bfff}
.msg.Vorschlag{border-left-color:#ffaa00}

/* BLINK */
@keyframes blink{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}
.new{animation:blink 1s infinite}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>🔐 Mitglieder Login</h2>
<input id="pw" type="password" placeholder="Passwort"><br>
<button onclick="login()">Login</button>
<div id="error"></div>
</div>

<script>
const config={
apiKey:"AIzaSyCFjUj-XSN0YnvAilerXPkXbw2iR2ixBv8",
authDomain:"kritik-system.firebaseapp.com",
databaseURL:"https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"kritik-system"
};

firebase.initializeApp(config);
const db=firebase.database();

let memberId=null;

// 🔐 LOGIN
function login(){
if(document.getElementById("pw").value !== "1"){
document.getElementById("error").innerText="❌ Falsches Passwort";
return;
}

memberId = localStorage.getItem("memberId") || Date.now().toString();
localStorage.setItem("memberId", memberId);

start();
}

// 🚀 START SYSTEM
function start(){

db.ref("members/"+memberId).set(true);
db.ref("members/"+memberId).onDisconnect().remove();

document.body.innerHTML=`
<img src="logo.png" class="logo">
<h2>👥 Mitglieder</h2>

<div>
👥 Mitglieder: <span id="members">0</span><br>
👔 Vorstand: <span id="admins">0</span>
</div>

<textarea id="text" placeholder="Dein Feedback"></textarea><br>

<button onclick="send('Kritik')">Kritik</button>
<button onclick="send('Lob')">Lob</button>
<button onclick="send('Frage')">Frage</button>
<button onclick="send('Vorschlag')">Vorschlag</button>

<div id="stats">
<div class="stat Kritik">Kritik: 0</div>
<div class="stat Lob">Lob: 0</div>
<div class="stat Frage">Frage: 0</div>
<div class="stat Vorschlag">Vorschlag: 0</div>
</div>

<div id="chat"></div>
`;

run();
}

// 🔥 HAUPTLOGIK
function run(){

// 🔴 LOGOUT BEI KICK (JETZT SICHER)
db.ref("members").on("value", snap=>{
const data = snap.val();
if(!data || !data[memberId]){
alert("⚠️ Du wurdest gekickt");
localStorage.removeItem("memberId");
location.reload();
}
});

// COUNTS
db.ref("members").on("value",s=>{
document.getElementById("members").innerText=s.numChildren();
});
db.ref("admins").on("value",s=>{
document.getElementById("admins").innerText=s.numChildren();
});

// SEND
window.send=(type)=>{
const text=document.getElementById("text").value;
if(!text)return;

db.ref("feedback").push({
type,text,time:new Date().toLocaleTimeString()
});

document.getElementById("text").value="";
};

// LIVE + STATS + BLINK
let seen={};

db.ref("feedback").on("value",snap=>{
const data=snap.val()||{};
const chat=document.getElementById("chat");

chat.innerHTML="";

let stats={Kritik:0,Lob:0,Frage:0,Vorschlag:0};

Object.entries(data).reverse().forEach(([id,r])=>{

if(stats[r.type]!=undefined) stats[r.type]++;

const div=document.createElement("div");
div.className="msg "+r.type;

// BLINK
if(!seen[id]){
div.classList.add("new");
setTimeout(()=>div.classList.remove("new"),15000);
seen[id]=true;
}

div.innerHTML=`
<b>${r.type}</b><br>
${r.text}<br>
<small>${r.time}</small>
`;

chat.appendChild(div);
});

// STATS UPDATE
document.querySelector(".stat.Kritik").innerText="Kritik: "+stats.Kritik;
document.querySelector(".stat.Lob").innerText="Lob: "+stats.Lob;
document.querySelector(".stat.Frage").innerText="Frage: "+stats.Frage;
document.querySelector(".stat.Vorschlag").innerText="Vorschlag: "+stats.Vorschlag;

});
}
</script>

</body>
</html>
