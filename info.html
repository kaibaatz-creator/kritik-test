<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Info</title>

<style>
body{background:#000;color:white;text-align:center;font-family:Arial;}
textarea{width:90%;height:200px;margin-top:20px;}
</style>
</head>

<body>

<button onclick="history.back()">⬅ Zurück</button>

<h2 id="title"></h2>

<textarea id="text" placeholder="Infos..."></textarea><br>
<button onclick="save()">Speichern</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDezLQGk1wUTUbX9FqLjUa0qzVY0cyHvNc",
  authDomain: "verein-system-f82a6.firebaseapp.com",
  databaseURL: "https://verein-system-f82a6-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "verein-system-f82a6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const event = new URLSearchParams(location.search).get("event");
title.innerText = event;

db.ref("test/info/"+event).on("value", snap=>{
  text.value = snap.val() || "";
});

function save(){
  db.ref("test/info/"+event).set(text.value);
}
</script>

</body>
</html>
