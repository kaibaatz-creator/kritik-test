<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#000;color:white;font-family:Arial;text-align:center;}

.box{
  background:#1e1e1e;
  margin:20px auto;
  padding:20px;
  border-radius:15px;
  max-width:600px;
}

input,textarea,select{
  width:90%;
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.blue{background:#00bfff;color:black;}
.red{background:red;color:white;}

.helperCard{
  background:#111;
  margin:10px;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2 id="title"></h2>

<div class="box">

<input id="ort" placeholder="📍 Ort">
<input id="datum" placeholder="📅 Datum">
<input id="zeit" placeholder="⏰ Uhrzeit">

<textarea id="beschreibung" placeholder="📝 Beschreibung"></textarea>

<select id="helfer">
  <option value="nein">Keine Helfer nötig</option>
  <option value="ja">Helfer werden benötigt</option>
</select>

<input id="max" placeholder="Max Helfer (z.B. 5)">

<br>
<button class="blue" onclick="save()">Speichern</button>

</div>

<div id="anzeige" class="box"></div>

<div id="helferBox" class="box" style="display:none;">

<h3>🙋 Helfer</h3>

<input id="hName" placeholder="Wer">
<input id="hWann" placeholder="Wann">
<input id="hWas" placeholder="Wo/Was">

<button class="blue" onclick="addHelper()">Eintragen</button>

<div id="helferListe"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const event = new URLSearchParams(window.location.search).get("event");

document.getElementById("title").innerText = event;

// 🔒 Passwort
const ADMIN_PW = "12";

// 🔥 SPEICHERN
function save(){

  const pw = prompt("Vorstand Passwort:");
  if(pw !== ADMIN_PW) return alert("Falsch");

  const data = {
    ort: ort.value,
    datum: datum.value,
    zeit: zeit.value,
    beschreibung: beschreibung.value,
    helfer: helfer.value,
    max: max.value || 0
  };

  db.ref("test/info/"+event).set(data);
}

// 🔥 LADEN
db.ref("test/info/"+event).on("value", snap=>{
  const d = snap.val();
  if(!d) return;

  anzeige.innerHTML = `
    <b>📍 ${d.ort || "-"}</b><br>
    📅 ${d.datum || "-"}<br>
    ⏰ ${d.zeit || "-"}<br><br>
    ${d.beschreibung || ""}
  `;

  helferBox.style.display = d.helfer==="ja" ? "block":"none";

  window.maxHelper = Number(d.max || 0);
});

// 🔥 HELFER ADD
function addHelper(){

  db.ref("test/helpers/"+event).once("value", snap=>{
    const count = snap.numChildren();

    if(window.maxHelper && count >= window.maxHelper){
      alert("Maximale Helfer erreicht!");
      return;
    }

    const name = hName.value;
    const wann = hWann.value;
    const was = hWas.value;

    if(!name || !wann || !was) return;

    db.ref("test/helpers/"+event).push({name,wann,was});

    hName.value="";
    hWann.value="";
    hWas.value="";
  });
}

// 🔥 HELFER LADEN
db.ref("test/helpers/"+event).on("value", snap=>{
  helferListe.innerHTML="";

  snap.forEach(child=>{
    const d = child.val();
    const id = child.key;

    const div = document.createElement("div");
    div.className="helperCard";

    div.innerHTML = `
      <b>${d.name}</b><br>
      ${d.wann}<br>
      ${d.was}<br><br>
      <button class="red" onclick="removeHelper('${id}')">Löschen</button>
    `;

    helferListe.appendChild(div);
  });
});

// 🔥 LÖSCHEN
function removeHelper(id){

  const pw = prompt("Vorstand Passwort:");
  if(pw !== ADMIN_PW) return alert("Falsch");

  db.ref("test/helpers/"+event+"/"+id).remove();
}
</script>

</body>
</html>
