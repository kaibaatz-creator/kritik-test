<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  background:#111;
  color:white;
  font-family:Arial;
  padding:20px;
}

h2{
  text-align:center;
}

.section{
  margin:30px 0;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th,td{
  border:1px solid #444;
  padding:10px;
  text-align:center;
}

th{
  background:#222;
}

input{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:5px;
}

.green{background:#00ff99;color:black;}
.red{background:red;color:white;}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="goBack()">← Zurück</button>
  <h2 id="title"></h2>
  <div></div>
</div>

<hr>

<!-- 🔧 Bereich erstellen -->
<div>
  <input id="areaName" placeholder="Bereich (z.B. Schminken)">
  <input id="zeit1" placeholder="Zeit 1 (z.B. 9-12)">
  <input id="zeit2" placeholder="Zeit 2 (z.B. 12-15)">
  <button class="green" onclick="createArea()">Bereich hinzufügen</button>
</div>

<div id="content"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const event = new URLSearchParams(window.location.search).get("event");
document.getElementById("title").innerText = event;

// 🔙 zurück
function goBack(){
  window.location.href = "index.html";
}

// 🔥 Bereich erstellen
function createArea(){

  const name = areaName.value;
  const z1 = zeit1.value;
  const z2 = zeit2.value;

  if(!name || !z1 || !z2) return alert("Bitte alles ausfüllen");

  const key = name.toLowerCase().replace(/\s+/g,"_");

  db.ref("test/planung/"+event+"/"+key).set({
    name, z1, z2
  });

  areaName.value="";
  zeit1.value="";
  zeit2.value="";
}

// 🔥 Bereiche laden
db.ref("test/planung/"+event).on("value", snap=>{
  const container = document.getElementById("content");
  container.innerHTML="";

  snap.forEach(child=>{
    const d = child.val();
    const key = child.key;

    const div = document.createElement("div");
    div.className="section";

    div.innerHTML = `
      <h3>${d.name}</h3>

      <table>
        <thead>
          <tr>
            <th>${d.z1}</th>
            <th>${d.z2}</th>
          </tr>
        </thead>
        <tbody id="table_${key}"></tbody>
      </table>

      <input id="name_${key}" placeholder="Name">
      <button onclick="add('${key}','1')">+ ${d.z1}</button>
      <button onclick="add('${key}','2')">+ ${d.z2}</button>
    `;

    container.appendChild(div);

    loadTable(key);
  });
});

// 🔥 Eintragen
function add(area,slot){

  const name = document.getElementById("name_"+area).value;
  if(!name) return;

  db.ref("test/planung/"+event+"/"+area+"/list").push({
    name, slot
  });

  document.getElementById("name_"+area).value="";
}

// 🔥 Tabelle laden
function loadTable(area){

  db.ref("test/planung/"+event+"/"+area+"/list").on("value", snap=>{

    const table = document.getElementById("table_"+area);
    if(!table) return;

    table.innerHTML="";

    let col1 = [];
    let col2 = [];

    snap.forEach(child=>{
      const d = child.val();
      if(d.slot==="1") col1.push(d.name);
      if(d.slot==="2") col2.push(d.name);
    });

    const max = Math.max(col1.length,col2.length);

    for(let i=0;i<max;i++){
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${col1[i]||""}</td>
        <td>${col2[i]||""}</td>
      `;
      table.appendChild(tr);
    }
  });
}
</script>

</body>
</html>
