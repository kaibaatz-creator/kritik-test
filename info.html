<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{background:#111;color:white;font-family:Arial;padding:20px;}

h2{text-align:center;}

.section{margin:30px 0;}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  border:1px solid #444;
  padding:10px;
  text-align:center;
}

input{
  padding:8px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin:5px;
}

.green{background:#00ff99;color:black;}
</style>
</head>

<body>

<button onclick="goBack()">← Zurück</button>
<h2 id="title"></h2>

<hr>

<!-- Bereich erstellen -->
<input id="areaName" placeholder="Bereich (z.B. Schminken)">
<input id="timeInput" placeholder="Zeit (z.B. 9-12)">
<button onclick="addTime()">➕ Zeit hinzufügen</button>

<div id="timePreview"></div>

<button class="green" onclick="createArea()">Bereich erstellen</button>

<hr>

<div id="content"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const event = new URLSearchParams(window.location.search).get("event");
document.getElementById("title").innerText = event;

// zurück
function goBack(){
  window.location.href="index.html";
}

// 🔥 Zeiten sammeln
let times=[];

function addTime(){
  const t = timeInput.value;
  if(!t) return;

  times.push(t);
  timeInput.value="";

  renderTimes();
}

function renderTimes(){
  timePreview.innerHTML = times.join(" | ");
}

// 🔥 Bereich erstellen
function createArea(){

  if(!areaName.value || times.length===0){
    alert("Name + Zeiten nötig");
    return;
  }

  const key = areaName.value.toLowerCase().replace(/\s+/g,"_");

  db.ref("test/planung/"+event+"/"+key).set({
    name: areaName.value,
    times: times
  });

  areaName.value="";
  times=[];
  renderTimes();
}

// 🔥 Bereiche laden
db.ref("test/planung/"+event).on("value", snap=>{
  content.innerHTML="";

  snap.forEach(child=>{
    const d = child.val();
    const key = child.key;

    const div = document.createElement("div");
    div.className="section";

    // HEADER
    let header = "<tr>";
    d.times.forEach(t=>{
      header += `<th>${t}</th>`;
    });
    header += "</tr>";

    div.innerHTML = `
      <h3>${d.name}</h3>

      <table>
        <thead>${header}</thead>
        <tbody id="table_${key}"></tbody>
      </table>

      <input id="name_${key}" placeholder="Name">
      ${d.times.map((t,i)=>`
        <button onclick="add('${key}',${i})">+ ${t}</button>
      `).join("")}
    `;

    content.appendChild(div);

    loadTable(key, d.times.length);
  });
});

// 🔥 Eintragen
function add(area,slot){

  const name = document.getElementById("name_"+area).value;
  if(!name) return;

  db.ref("test/planung/"+event+"/"+area+"/list").push({
    name, slot
  });

  document.getElementById("name_"+area).value="";
}

// 🔥 Tabelle
function loadTable(area,cols){

  db.ref("test/planung/"+event+"/"+area+"/list").on("value", snap=>{

    const table = document.getElementById("table_"+area);
    if(!table) return;

    table.innerHTML="";

    let columns = Array.from({length:cols},()=>[]);

    snap.forEach(child=>{
      const d = child.val();
      columns[d.slot].push(d.name);
    });

    const max = Math.max(...columns.map(c=>c.length),0);

    for(let i=0;i<max;i++){
      const tr = document.createElement("tr");

      tr.innerHTML = columns.map(col=>`
        <td>${col[i]||""}</td>
      `).join("");

      table.appendChild(tr);
    }

  });
}
</script>

</body>
</html>
