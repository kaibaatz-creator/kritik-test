<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veranstaltungen</title>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  margin:0;
  text-align:center;
}

h1{
  margin-top:20px;
}

/* 🔝 Button */
.top{
  text-align:center;
  margin:20px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* 🔥 GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.column{
  background:#111;
  border-radius:15px;
  padding:15px;
}

.column h2{
  margin-bottom:15px;
}

/* 🧱 Karten */
.card{
  background:#1e1e1e;
  margin:10px 0;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}
</style>
</head>

<body>

<h1>🎉 Veranstaltungen</h1>

<div class="top">
  <button onclick="createNewEvent()">➕ Neue Veranstaltung</button>
</div>

<div class="grid">

  <!-- 📄 INFO -->
  <div class="column">
    <h2>📄 Infos</h2>
    <div id="infoList"></div>
  </div>

  <!-- 🧺 LISTE -->
  <div class="column">
    <h2>🧺 Mitbringliste</h2>
    <div id="listList"></div>
  </div>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ADMIN_PW = "12";

// ➕ EVENT ERSTELLEN
function createNewEvent(){

  const pw = prompt("Passwort:");
  if(pw !== ADMIN_PW){
    alert("Falsch");
    return;
  }

  const name = prompt("Name der Veranstaltung:");
  if(!name) return;

  const key = name.toLowerCase().replace(/\s+/g,"_");

  const type = prompt("1 = Mitbringliste\n2 = Info");

  if(type !== "1" && type !== "2"){
    alert("Abbruch");
    return;
  }

  db.ref("test/events/"+key).set({
    name,
    type
  });
}

// 🔥 LADEN
db.ref("test/events").on("value", snap=>{

  infoList.innerHTML="";
  listList.innerHTML="";

  snap.forEach(child=>{
    const d = child.val();
    const key = child.key;

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = d.name;

    div.onclick = function(){
      if(d.type === "1"){
        window.location.href = "liste.html?event=" + key;
      }else{
        window.location.href = "info.html?event=" + key;
      }
    };

    // 👉 AUFTEILEN
    if(d.type === "2"){
      infoList.appendChild(div);
    }else{
      listList.appendChild(div);
    }

  });

});
</script>

</body>
</html>
