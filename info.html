<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veranstaltungen</title>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  margin:0;
  text-align:center;
}

h1{margin-top:20px;}

.top{
  margin:20px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.column{
  background:#111;
  border-radius:15px;
  padding:15px;
}

.card{
  background:#1e1e1e;
  margin:10px 0;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.03);
}
</style>
</head>

<body>

<h1>🎉 Veranstaltungen</h1>

<div class="top">
  <button onclick="createNewEvent()">➕ Neue Veranstaltung</button>
</div>

<div class="grid">

  <div class="column">
    <h2>📄 Infos</h2>
    <div id="infoList"></div>
  </div>

  <div class="column">
    <h2>🧺 Mitbringlisten</h2>
    <div id="listList"></div>
  </div>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCFjuJ-XSN0YnvAilerXPkXbw2iR2ixBv8",
  authDomain: "kritik-system.firebaseapp.com",
  databaseURL: "https://kritik-system-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kritik-system"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ADMIN_PW = "12";

// ➕ EVENT ERSTELLEN
function createNewEvent(){

  const pw = prompt("Passwort:");
  if(pw !== ADMIN_PW){
    alert("Falsch");
    return;
  }

  const name = prompt("Name der Veranstaltung:");
  if(!name) return;

  const datum = prompt("Datum (TT.MM.JJJJ):");

  const key = name.toLowerCase().replace(/\s+/g,"_");

  const type = prompt("1 = Mitbringliste\n2 = Info");

  if(type !== "1" && type !== "2"){
    alert("Abbruch");
    return;
  }

  db.ref("test/events/"+key).set({
    name,
    type,
    datum: datum || ""
  });
}

// ❌ EVENT LÖSCHEN
function deleteEvent(key){

  const pw = prompt("Passwort:");
  if(pw !== ADMIN_PW){
    alert("Falsch");
    return;
  }

  if(!confirm("Wirklich löschen?")) return;

  db.ref("test/events/"+key).remove();
  db.ref("test/lists/"+key).remove();
  db.ref("test/info/"+key).remove();
  db.ref("test/planung/"+key).remove();
}

// ⏳ COUNTDOWN
function getCountdown(dateStr){

  if(!dateStr) return "";

  const parts = dateStr.split(".");
  if(parts.length !== 3) return "";

  const d = new Date(parts[2], parts[1]-1, parts[0]);
  const now = new Date();

  d.setHours(0,0,0,0);
  now.setHours(0,0,0,0);

  const diff = Math.ceil((d - now) / (1000*60*60*24));

  if(diff < 0) return "❌ vorbei";
  if(diff === 0) return "🟢 heute";
  if(diff === 1) return "🔥 morgen";
  if(diff <= 7) return `⚡ noch ${diff} Tage`;

  return `⏳ noch ${diff} Tage`;
}

// 🔥 EVENTS LADEN
db.ref("test/events").on("value", snap=>{

  infoList.innerHTML="";
  listList.innerHTML="";

  snap.forEach(child=>{
    const d = child.val();
    const key = child.key;

    const countdown = getCountdown(d.datum);

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${d.name}</b><br>
      <small>📅 ${d.datum || "-"}</small><br>
      <small>${countdown}</small><br><br>

      <button onclick="event.stopPropagation(); deleteEvent('${key}')">❌</button>
    `;

    div.onclick = function(){
      if(d.type === "1"){
        window.location.href = "liste.html?event=" + key;
      }else{
        window.location.href = "info.html?event=" + key;
      }
    };

    if(d.type === "2"){
      infoList.appendChild(div);
    }else{
      listList.appendChild(div);
    }

  });

});
</script>

</body>
</html>
